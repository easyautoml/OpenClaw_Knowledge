<svg viewBox="0 0 740 582" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">

  <!-- Background -->
  <rect width="740" height="582" fill="#080b16" rx="14"/>

  <!-- Vertical spine line -->
  <line x1="50" y1="58" x2="50" y2="498" stroke="#1f2937" stroke-width="2"/>

  <!-- ══════════════════════════════════════
       Step 1 — You send a message  (cy=40)
  ══════════════════════════════════════ -->
  <circle cx="50" cy="40" r="18" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <text x="50" y="45" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="700">1</text>
  <rect x="82" y="14" width="644" height="52" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="82" y="14" width="5" height="52" rx="3" fill="#3b82f6"/>
  <text x="102" y="36" fill="#93c5fd" font-size="13" font-weight="700">You send a message</text>
  <text x="102" y="54" fill="#6b7280" font-size="11">From Telegram, Slack, Discord, WhatsApp, or any connected messaging app</text>
  <!-- arrow -->
  <polygon points="44,82 50,90 56,82" fill="#1f2937"/>

  <!-- ══════════════════════════════════════
       Step 2 — Channel Plugin  (cy=108)
  ══════════════════════════════════════ -->
  <circle cx="50" cy="108" r="18" fill="#0f172a" stroke="#8b5cf6" stroke-width="2"/>
  <text x="50" y="113" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">2</text>
  <rect x="82" y="82" width="644" height="52" rx="8" fill="#0f172a" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="82" y="82" width="5" height="52" rx="3" fill="#8b5cf6"/>
  <text x="102" y="104" fill="#c4b5fd" font-size="13" font-weight="700">Channel Plugin — receives &amp; normalises</text>
  <text x="102" y="122" fill="#6b7280" font-size="11">Translates the platform-specific event into a common message format · checks the allowlist</text>
  <!-- arrow -->
  <polygon points="44,150 50,158 56,150" fill="#1f2937"/>

  <!-- ══════════════════════════════════════
       Step 3 — Gateway  (cy=176)
  ══════════════════════════════════════ -->
  <circle cx="50" cy="176" r="18" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
  <text x="50" y="181" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="700">3</text>
  <rect x="82" y="150" width="644" height="52" rx="8" fill="#0f172a" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="82" y="150" width="5" height="52" rx="3" fill="#22c55e"/>
  <text x="102" y="172" fill="#86efac" font-size="13" font-weight="700">Gateway — routes to the right agent</text>
  <text x="102" y="190" fill="#6b7280" font-size="11">Determines which agent should handle this message · applies group &amp; mention policies</text>
  <!-- arrow -->
  <polygon points="44,218 50,226 56,218" fill="#1f2937"/>

  <!-- ══════════════════════════════════════
       Step 4 — Agent  (cy=244)
  ══════════════════════════════════════ -->
  <circle cx="50" cy="244" r="18" fill="#0f172a" stroke="#a855f7" stroke-width="2"/>
  <text x="50" y="249" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="700">4</text>
  <rect x="82" y="218" width="644" height="52" rx="8" fill="#0f172a" stroke="#a855f7" stroke-width="1.5"/>
  <rect x="82" y="218" width="5" height="52" rx="3" fill="#a855f7"/>
  <text x="102" y="240" fill="#d8b4fe" font-size="13" font-weight="700">Agent — assembles the prompt</text>
  <text x="102" y="258" fill="#6b7280" font-size="11">Loads identity files (AGENTS.md · SOUL.md) and active Skills into the LLM context</text>
  <!-- arrow -->
  <polygon points="44,286 50,294 56,286" fill="#1f2937"/>

  <!-- ══════════════════════════════════════
       Step 5 — LLM  (cy=312)
  ══════════════════════════════════════ -->
  <circle cx="50" cy="312" r="18" fill="#0f172a" stroke="#6366f1" stroke-width="2"/>
  <text x="50" y="317" text-anchor="middle" fill="#818cf8" font-size="13" font-weight="700">5</text>
  <rect x="82" y="286" width="644" height="52" rx="8" fill="#0f172a" stroke="#6366f1" stroke-width="1.5"/>
  <rect x="82" y="286" width="5" height="52" rx="3" fill="#6366f1"/>
  <text x="102" y="308" fill="#a5b4fc" font-size="13" font-weight="700">LLM — generates a response</text>
  <text x="102" y="326" fill="#6b7280" font-size="11">Reads the prompt · decides what to do · may call one or more Tools to get real-world data</text>
  <!-- arrow -->
  <polygon points="44,354 50,362 56,354" fill="#1f2937"/>

  <!-- ══════════════════════════════════════
       Step 6 — Tools  (cy=380)
  ══════════════════════════════════════ -->
  <circle cx="50" cy="380" r="18" fill="#0f172a" stroke="#eab308" stroke-width="2"/>
  <text x="50" y="385" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700">6</text>
  <rect x="82" y="354" width="644" height="52" rx="8" fill="#0f172a" stroke="#eab308" stroke-width="1.5"/>
  <rect x="82" y="354" width="5" height="52" rx="3" fill="#eab308"/>
  <text x="102" y="376" fill="#fde68a" font-size="13" font-weight="700">Tools — execute real actions</text>
  <text x="102" y="394" fill="#6b7280" font-size="11">exec · web_search · browser · read / write · mem_read — results returned to the LLM</text>
  <!-- arrow -->
  <polygon points="44,422 50,430 56,422" fill="#1f2937"/>

  <!-- ══════════════════════════════════════
       Step 7 — Agent formats reply  (cy=448)
  ══════════════════════════════════════ -->
  <circle cx="50" cy="448" r="18" fill="#0f172a" stroke="#a855f7" stroke-width="2"/>
  <text x="50" y="453" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="700">7</text>
  <rect x="82" y="422" width="644" height="52" rx="8" fill="#0f172a" stroke="#a855f7" stroke-width="1.5"/>
  <rect x="82" y="422" width="5" height="52" rx="3" fill="#a855f7"/>
  <text x="102" y="444" fill="#d8b4fe" font-size="13" font-weight="700">Agent — formats the final reply</text>
  <text x="102" y="462" fill="#6b7280" font-size="11">Applies chunking · threading rules · streaming — prepares delivery to the channel</text>
  <!-- arrow -->
  <polygon points="44,490 50,498 56,490" fill="#1f2937"/>

  <!-- ══════════════════════════════════════
       Step 8 — Channel Plugin (reply)  (cy=516)
  ══════════════════════════════════════ -->
  <circle cx="50" cy="516" r="18" fill="#0f172a" stroke="#8b5cf6" stroke-width="2"/>
  <text x="50" y="521" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">8</text>
  <rect x="82" y="490" width="644" height="52" rx="8" fill="#0f172a" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="82" y="490" width="5" height="52" rx="3" fill="#8b5cf6"/>
  <text x="102" y="512" fill="#c4b5fd" font-size="13" font-weight="700">Channel Plugin — sends the reply back to you</text>
  <text x="102" y="530" fill="#6b7280" font-size="11">Delivers the response in the same app you used · no extra steps, no separate dashboard</text>

  <!-- ══════════════════════════════════════
       Footer note
  ══════════════════════════════════════ -->
  <rect x="82" y="554" width="644" height="22" rx="6" fill="#0f172a" stroke="#1f2937" stroke-width="1"/>
  <text x="404" y="569" text-anchor="middle" fill="#4b5563" font-size="11">The reply arrives in the same app you sent the message from — the same path runs for every message, every time</text>

</svg>
