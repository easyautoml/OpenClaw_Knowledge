<svg xmlns="http://www.w3.org/2000/svg" width="720" height="530" viewBox="0 0 720 530" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="720" height="530" rx="16" fill="#0f1117"/>

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">How a Channel Handles Your Message</text>
  <text x="360" y="48" text-anchor="middle" fill="#475569" font-size="11">Every message in and every reply out passes through the channel layer</text>

  <!-- ── STEP 1 — You send a message ── -->
  <rect x="160" y="64" width="340" height="64" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="148" cy="96" r="14" fill="#3b82f6"/>
  <text x="148" y="101" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>
  <text x="330" y="89" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">You send a message</text>
  <text x="330" y="110" text-anchor="middle" fill="#64748b" font-size="11">from Telegram, Slack, Discord, WhatsApp…</text>
  <text x="524" y="96" fill="#334155" font-size="10" font-style="italic">any connected app</text>

  <!-- Arrow 1→2 -->
  <line x1="330" y1="128" x2="330" y2="148" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="324,146 330,156 336,146" fill="#3b82f6"/>

  <!-- ── STEP 2 — Channel plugin receives it ── -->
  <rect x="140" y="156" width="380" height="64" rx="12" fill="#1e1b3a" stroke="#6366f1" stroke-width="2"/>
  <circle cx="128" cy="188" r="14" fill="#6366f1"/>
  <text x="128" y="193" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>
  <text x="330" y="181" text-anchor="middle" fill="#a5b4fc" font-size="13" font-weight="700">Channel plugin receives it</text>
  <text x="330" y="202" text-anchor="middle" fill="#64748b" font-size="11">the matching plugin handles the incoming event</text>

  <!-- Arrow 2→3 -->
  <line x1="330" y1="220" x2="330" y2="240" stroke="#6366f1" stroke-width="2"/>
  <polygon points="324,238 330,248 336,238" fill="#6366f1"/>

  <!-- ── STEP 3 — Allowlist check ── -->
  <rect x="120" y="248" width="420" height="80" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <circle cx="108" cy="288" r="14" fill="#8b5cf6"/>
  <text x="108" y="293" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>
  <text x="330" y="272" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">Allowlist check</text>
  <!-- chips -->
  <rect x="136" y="282" width="130" height="22" rx="6" fill="#2d1f4e"/>
  <text x="201" y="297" text-anchor="middle" fill="#a5b4fc" font-size="10">✓ sender is allowed?</text>
  <rect x="274" y="282" width="130" height="22" rx="6" fill="#2d1f4e"/>
  <text x="339" y="297" text-anchor="middle" fill="#a5b4fc" font-size="10">✓ @mentioned in group?</text>
  <rect x="412" y="282" width="116" height="22" rx="6" fill="#450a0a"/>
  <text x="470" y="297" text-anchor="middle" fill="#f87171" font-size="10">✗ blocked → dropped</text>
  <text x="136" y="318" fill="#475569" font-size="10" font-style="italic">only approved senders reach the agent</text>

  <!-- Arrow 3→4 -->
  <line x1="330" y1="328" x2="330" y2="348" stroke="#8b5cf6" stroke-width="2"/>
  <polygon points="324,346 330,356 336,346" fill="#8b5cf6"/>

  <!-- ── STEP 4 — Agent processes + LLM ── -->
  <rect x="140" y="356" width="380" height="64" rx="12" fill="#1a0d26" stroke="#a855f7" stroke-width="2"/>
  <circle cx="128" cy="388" r="14" fill="#a855f7"/>
  <text x="128" y="393" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text>
  <text x="330" y="381" text-anchor="middle" fill="#d8b4fe" font-size="13" font-weight="700">Agent processes it — calls the LLM</text>
  <text x="330" y="402" text-anchor="middle" fill="#64748b" font-size="11">uses tools if needed, generates a reply</text>

  <!-- Arrow 4→5 -->
  <line x1="330" y1="420" x2="330" y2="440" stroke="#22c55e" stroke-width="2"/>
  <polygon points="324,438 330,448 336,438" fill="#22c55e"/>

  <!-- ── STEP 5 — Reply delivered ── -->
  <rect x="160" y="448" width="340" height="64" rx="12" fill="#052e16" stroke="#22c55e" stroke-width="2.5"/>
  <circle cx="148" cy="480" r="14" fill="#22c55e"/>
  <text x="148" y="485" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">5</text>
  <text x="330" y="473" text-anchor="middle" fill="#bbf7d0" font-size="13" font-weight="700">Reply delivered back to you</text>
  <text x="330" y="494" text-anchor="middle" fill="#86efac" font-size="11">through the same channel and app you used</text>

  <!-- Compaction note -->
  <rect x="100" y="526" width="520" height="0" rx="4" fill="#1e293b"/>

</svg>
