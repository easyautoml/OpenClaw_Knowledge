<svg xmlns="http://www.w3.org/2000/svg" width="720" height="780" viewBox="0 0 720 780" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="720" height="780" rx="16" fill="#0f1117"/>

  <!-- Title -->
  <text x="360" y="40" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">LiteLLM Setup Flow</text>
  <text x="360" y="60" text-anchor="middle" fill="#64748b" font-size="12">Step-by-step: PostgreSQL + LiteLLM Proxy with Dashboard</text>

  <!-- ═══ STEP 1: Install PostgreSQL ═══ -->
  <rect x="120" y="84" width="480" height="78" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="170" cy="123" r="18" fill="#1d4ed8"/>
  <text x="170" y="129" text-anchor="middle" fill="white" font-size="13" font-weight="700">1</text>
  <text x="360" y="112" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">Install PostgreSQL</text>
  <text x="360" y="130" text-anchor="middle" fill="#94a3b8" font-size="11">Required for usage tracking, audit logs, and key management</text>
  <text x="360" y="150" text-anchor="middle" fill="#475569" font-size="10">Ubuntu: sudo apt install postgresql  ·  Mac: brew install postgresql</text>
  <!-- side note -->
  <rect x="612" y="100" width="88" height="26" rx="6" fill="#1e1b3a" stroke="#4338ca" stroke-width="1"/>
  <text x="656" y="117" text-anchor="middle" fill="#818cf8" font-size="9" font-weight="600">Port 5432</text>

  <!-- Arrow 1 -->
  <line x1="360" y1="162" x2="360" y2="188" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="354,186 360,196 366,186" fill="#3b82f6"/>

  <!-- ═══ STEP 2: Create PostgreSQL DB ═══ -->
  <rect x="120" y="198" width="480" height="78" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <circle cx="170" cy="237" r="18" fill="#4f46e5"/>
  <text x="170" y="243" text-anchor="middle" fill="white" font-size="13" font-weight="700">2</text>
  <text x="360" y="226" text-anchor="middle" fill="#a5b4fc" font-size="13" font-weight="700">Create a Database for LiteLLM</text>
  <text x="360" y="244" text-anchor="middle" fill="#94a3b8" font-size="11">Create a dedicated database that LiteLLM will use</text>
  <text x="360" y="262" text-anchor="middle" fill="#475569" font-size="10">psql -c "CREATE DATABASE litellm_db;"</text>

  <!-- Arrow 2 -->
  <line x1="360" y1="276" x2="360" y2="302" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="354,300 360,310 366,300" fill="#6366f1"/>

  <!-- ═══ STEP 3: Install LiteLLM ═══ -->
  <rect x="120" y="312" width="480" height="78" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <circle cx="170" cy="351" r="18" fill="#7c3aed"/>
  <text x="170" y="357" text-anchor="middle" fill="white" font-size="13" font-weight="700">3</text>
  <text x="360" y="340" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">Install LiteLLM</text>
  <text x="360" y="358" text-anchor="middle" fill="#94a3b8" font-size="11">Install the LiteLLM proxy package via pip</text>
  <text x="360" y="376" text-anchor="middle" fill="#475569" font-size="10">pip install 'litellm[proxy]'</text>

  <!-- Arrow 3 -->
  <line x1="360" y1="390" x2="360" y2="416" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="354,414 360,424 366,414" fill="#8b5cf6"/>

  <!-- ═══ STEP 4: Create config.yaml ═══ -->
  <rect x="120" y="426" width="480" height="92" rx="12" fill="#1e293b" stroke="#ec4899" stroke-width="2"/>
  <circle cx="170" cy="472" r="18" fill="#be185d"/>
  <text x="170" y="478" text-anchor="middle" fill="white" font-size="13" font-weight="700">4</text>
  <text x="360" y="453" text-anchor="middle" fill="#f9a8d4" font-size="13" font-weight="700">Create config.yaml</text>
  <text x="360" y="471" text-anchor="middle" fill="#94a3b8" font-size="11">Define your models and database connection in a config file</text>
  <text x="360" y="491" text-anchor="middle" fill="#475569" font-size="10">Add Azure OpenAI model entries (see Section 5 below)</text>
  <text x="360" y="509" text-anchor="middle" fill="#475569" font-size="10">Set database_url: postgresql://user:pass@localhost/litellm_db</text>

  <!-- Arrow 4 -->
  <line x1="360" y1="518" x2="360" y2="544" stroke="#ec4899" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="354,542 360,552 366,542" fill="#ec4899"/>

  <!-- ═══ STEP 5: Set Env Vars ═══ -->
  <rect x="120" y="554" width="480" height="78" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="170" cy="593" r="18" fill="#b45309"/>
  <text x="170" y="599" text-anchor="middle" fill="white" font-size="13" font-weight="700">5</text>
  <text x="360" y="582" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">Set Environment Variables</text>
  <text x="360" y="600" text-anchor="middle" fill="#94a3b8" font-size="11">Pass your Azure OpenAI credentials as environment variables</text>
  <text x="360" y="620" text-anchor="middle" fill="#475569" font-size="10">AZURE_API_KEY=...   AZURE_API_BASE=https://&lt;name&gt;.openai.azure.com/</text>

  <!-- Arrow 5 -->
  <line x1="360" y1="632" x2="360" y2="658" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="354,656 360,666 366,656" fill="#f59e0b"/>

  <!-- ═══ STEP 6: Start LiteLLM ═══ -->
  <rect x="120" y="668" width="480" height="68" rx="12" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <circle cx="170" cy="702" r="18" fill="#15803d"/>
  <text x="170" y="708" text-anchor="middle" fill="white" font-size="13" font-weight="700">6</text>
  <text x="360" y="691" text-anchor="middle" fill="#bbf7d0" font-size="13" font-weight="700">Start LiteLLM Proxy</text>
  <text x="360" y="711" text-anchor="middle" fill="#86efac" font-size="11">litellm --config config.yaml --port 4000</text>
  <text x="360" y="728" text-anchor="middle" fill="#4ade80" font-size="10">Dashboard ready at  http://localhost:4000  — proxy ready for requests</text>

  <!-- Footer -->
  <text x="360" y="768" text-anchor="middle" fill="#334155" font-size="10">OpenClaw — LiteLLM Setup Flow</text>

</svg>
