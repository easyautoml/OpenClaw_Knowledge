<svg xmlns="http://www.w3.org/2000/svg" width="680" height="220" viewBox="0 0 680 220" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="680" height="220" rx="16" fill="#0f1117"/>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">You Always Talk to the Agent — Not the Model</text>

  <!-- YOU box -->
  <rect x="40" y="70" width="130" height="80" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="105" y="104" text-anchor="middle" fill="#93c5fd" font-size="20">👤</text>
  <text x="105" y="128" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">You</text>

  <!-- Arrow YOU -> AGENT -->
  <line x1="172" y1="110" x2="232" y2="110" stroke="#6366f1" stroke-width="2.5"/>
  <polygon points="229,104 240,110 229,116" fill="#6366f1"/>
  <text x="206" y="102" text-anchor="middle" fill="#6366f1" font-size="10">message</text>

  <!-- AGENT box -->
  <rect x="242" y="60" width="160" height="100" rx="12" fill="#1e1b3a" stroke="#6366f1" stroke-width="2.5"/>
  <text x="322" y="100" text-anchor="middle" fill="#a5b4fc" font-size="20">⚙</text>
  <text x="322" y="122" text-anchor="middle" fill="#a5b4fc" font-size="13" font-weight="700">Agent</text>
  <text x="322" y="140" text-anchor="middle" fill="#475569" font-size="10">identity · tools · rules</text>

  <!-- Arrow AGENT -> MODELS -->
  <line x1="404" y1="110" x2="464" y2="110" stroke="#22c55e" stroke-width="2.5"/>
  <polygon points="461,104 472,110 461,116" fill="#22c55e"/>
  <text x="438" y="102" text-anchor="middle" fill="#22c55e" font-size="10">uses</text>

  <!-- MODELS box -->
  <rect x="474" y="60" width="160" height="100" rx="12" fill="#0a1f14" stroke="#22c55e" stroke-width="2"/>
  <text x="554" y="100" text-anchor="middle" fill="#86efac" font-size="20">🧠</text>
  <text x="554" y="122" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">Model</text>
  <text x="554" y="140" text-anchor="middle" fill="#475569" font-size="10">Claude · GPT · Ollama…</text>

  <!-- Bottom note -->
  <text x="340" y="190" text-anchor="middle" fill="#334155" font-size="11">Agent is the required layer — you cannot talk to a Model directly</text>

</svg>
