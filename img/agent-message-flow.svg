<svg xmlns="http://www.w3.org/2000/svg" width="740" height="760" viewBox="0 0 740 760" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="740" height="760" rx="16" fill="#0f1117"/>

  <!-- Title -->
  <text x="370" y="32" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">How a Message Gets Handled</text>
  <text x="370" y="50" text-anchor="middle" fill="#475569" font-size="11">Every message follows this flow — the tool loop repeats until the agent is done</text>

  <!-- ── STEP 1 — You send a message ── -->
  <rect x="170" y="66" width="300" height="64" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="158" cy="98" r="14" fill="#3b82f6"/>
  <text x="158" y="103" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>
  <text x="320" y="91" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">You send a message</text>
  <text x="320" y="112" text-anchor="middle" fill="#64748b" font-size="11">via Telegram, WhatsApp, Slack, terminal…</text>
  <!-- side note -->
  <text x="492" y="98" fill="#334155" font-size="10" font-style="italic">any channel</text>

  <!-- Arrow 1→2 -->
  <line x1="320" y1="130" x2="320" y2="150" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="314,148 320,158 326,148" fill="#3b82f6"/>

  <!-- ── STEP 2 — Agent receives ── -->
  <rect x="150" y="158" width="340" height="64" rx="12" fill="#1e1b3a" stroke="#6366f1" stroke-width="2"/>
  <circle cx="138" cy="190" r="14" fill="#6366f1"/>
  <text x="138" y="195" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>
  <text x="320" y="183" text-anchor="middle" fill="#a5b4fc" font-size="13" font-weight="700">Agent receives it</text>
  <text x="320" y="204" text-anchor="middle" fill="#64748b" font-size="11">the gateway routes it to the right agent</text>

  <!-- Arrow 2→3 -->
  <line x1="320" y1="222" x2="320" y2="242" stroke="#6366f1" stroke-width="2"/>
  <polygon points="314,240 320,250 326,240" fill="#6366f1"/>

  <!-- ── STEP 3 — Loads context ── -->
  <rect x="130" y="250" width="380" height="80" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <circle cx="118" cy="290" r="14" fill="#8b5cf6"/>
  <text x="118" y="295" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>
  <text x="320" y="275" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">Loads context</text>
  <!-- three chips -->
  <rect x="146" y="284" width="120" height="22" rx="6" fill="#2d1f4e"/>
  <text x="206" y="299" text-anchor="middle" fill="#a5b4fc" font-size="10">📄 CLAUDE.md</text>
  <rect x="274" y="284" width="122" height="22" rx="6" fill="#2d1f4e"/>
  <text x="335" y="299" text-anchor="middle" fill="#a5b4fc" font-size="10">📁 Workspace files</text>
  <rect x="404" y="284" width="96" height="22" rx="6" fill="#2d1f4e"/>
  <text x="452" y="299" text-anchor="middle" fill="#a5b4fc" font-size="10">💬 Chat history</text>
  <!-- side note -->
  <text x="552" y="295" fill="#334155" font-size="10" font-style="italic">from workspace</text>

  <!-- Arrow 3→4 -->
  <line x1="320" y1="330" x2="320" y2="350" stroke="#8b5cf6" stroke-width="2"/>
  <polygon points="314,348 320,358 326,348" fill="#8b5cf6"/>

  <!-- ── STEP 4 — Calls Model ── -->
  <rect x="150" y="358" width="340" height="64" rx="12" fill="#1a0d26" stroke="#a855f7" stroke-width="2"/>
  <circle cx="138" cy="390" r="14" fill="#a855f7"/>
  <text x="138" y="395" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text>
  <text x="320" y="383" text-anchor="middle" fill="#d8b4fe" font-size="13" font-weight="700">Calls the Model (LLM)</text>
  <text x="320" y="404" text-anchor="middle" fill="#64748b" font-size="11">sends message + context to Claude / GPT / Ollama…</text>

  <!-- Arrow 4→5 -->
  <line x1="320" y1="422" x2="320" y2="442" stroke="#a855f7" stroke-width="2"/>
  <polygon points="314,440 320,450 326,440" fill="#a855f7"/>

  <!-- ── STEP 5 — Model replies / tool loop ── -->
  <!-- Loop box outline -->
  <rect x="100" y="450" width="520" height="180" rx="14" fill="#111827" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="118" y="440" width="180" height="20" rx="5" fill="#92400e"/>
  <text x="208" y="454" text-anchor="middle" fill="#fef3c7" font-size="10" font-weight="700">Tool Loop — repeats if needed</text>

  <!-- Model reply box -->
  <rect x="120" y="462" width="490" height="52" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="108" cy="488" r="14" fill="#f59e0b"/>
  <text x="108" y="493" text-anchor="middle" fill="#0f1117" font-size="11" font-weight="700">5</text>
  <text x="365" y="483" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="700">Model replies</text>
  <text x="365" y="501" text-anchor="middle" fill="#64748b" font-size="11">text answer  —or—  "use tool: search web for X"</text>

  <!-- Loop arrow right side -->
  <line x1="612" y1="488" x2="630" y2="488" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="630" y1="488" x2="630" y2="540" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="630" y1="540" x2="612" y2="540" stroke="#f59e0b" stroke-width="1.5"/>
  <polygon points="614,534 604,540 614,546" fill="#f59e0b"/>
  <text x="648" y="519" fill="#f59e0b" font-size="9" font-style="italic">loops</text>
  <text x="648" y="531" fill="#f59e0b" font-size="9" font-style="italic">back</text>

  <!-- Tool run box -->
  <rect x="120" y="524" width="490" height="52" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <circle cx="108" cy="550" r="14" fill="#10b981"/>
  <text x="108" y="555" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">5b</text>
  <text x="365" y="545" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="700">Agent runs the tool</text>
  <text x="365" y="563" text-anchor="middle" fill="#64748b" font-size="11">web search · run code · read file · send message…</text>

  <!-- Arrow loop back label -->
  <text x="138" y="600" fill="#475569" font-size="10" font-style="italic">result fed back to Model → repeats until model says it is done</text>

  <!-- Arrow 5→6 -->
  <line x1="320" y1="632" x2="320" y2="652" stroke="#22c55e" stroke-width="2"/>
  <polygon points="314,650 320,660 326,650" fill="#22c55e"/>

  <!-- ── STEP 6 — Reply back to you ── -->
  <rect x="150" y="660" width="340" height="64" rx="12" fill="#052e16" stroke="#22c55e" stroke-width="2.5"/>
  <circle cx="138" cy="692" r="14" fill="#22c55e"/>
  <text x="138" y="697" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">6</text>
  <text x="320" y="685" text-anchor="middle" fill="#bbf7d0" font-size="13" font-weight="700">Reply delivered to you</text>
  <text x="320" y="706" text-anchor="middle" fill="#86efac" font-size="11">back through the same channel you used</text>

  <!-- Compaction note at bottom -->
  <rect x="110" y="736" width="520" height="16" rx="4" fill="#1e293b"/>
  <text x="370" y="748" text-anchor="middle" fill="#475569" font-size="10">If chat history grows too long — agent auto-compresses older turns so it never runs out of context</text>

</svg>
