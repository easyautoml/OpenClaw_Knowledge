<svg xmlns="http://www.w3.org/2000/svg" width="820" height="500" viewBox="0 0 820 500" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="820" height="500" rx="16" fill="#0f1117"/>

  <!-- Title -->
  <text x="410" y="32" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">Tools — What the Agent Can Do</text>
  <text x="410" y="50" text-anchor="middle" fill="#475569" font-size="11">The agent decides which tool to use automatically — you just describe what you want</text>

  <!-- ── Connector lines (drawn first so boxes sit on top) ── -->
  <!-- to Web -->
  <line x1="375" y1="210" x2="248" y2="140" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- to Code -->
  <line x1="365" y1="235" x2="208" y2="265" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- to Messaging -->
  <line x1="375" y1="260" x2="248" y2="348" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- to Files -->
  <line x1="445" y1="210" x2="572" y2="140" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- to Memory -->
  <line x1="455" y1="235" x2="612" y2="265" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- to Sub-agents -->
  <line x1="445" y1="260" x2="572" y2="348" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- ── AGENT center ── -->
  <rect x="340" y="190" width="140" height="90" rx="14" fill="#1e1b3a" stroke="#6366f1" stroke-width="2.5"/>
  <text x="410" y="225" text-anchor="middle" fill="#a5b4fc" font-size="26">⚙</text>
  <text x="410" y="252" text-anchor="middle" fill="#a5b4fc" font-size="13" font-weight="700">Agent</text>
  <text x="410" y="268" text-anchor="middle" fill="#475569" font-size="10">uses tools automatically</text>

  <!-- ══════════ TOP LEFT — Web ══════════ -->
  <rect x="94" y="74" width="200" height="92" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <rect x="94" y="62" width="120" height="20" rx="5" fill="#1d4ed8"/>
  <text x="154" y="76" text-anchor="middle" fill="#bfdbfe" font-size="10" font-weight="700">🌐  Web</text>
  <text x="104" y="106" fill="#93c5fd" font-size="11">• Search the internet</text>
  <text x="104" y="122" fill="#93c5fd" font-size="11">• Fetch any webpage</text>
  <text x="104" y="138" fill="#93c5fd" font-size="11">• Read a PDF from a URL</text>
  <text x="104" y="154" fill="#475569" font-size="10" font-style="italic">No setup needed</text>

  <!-- ══════════ MIDDLE LEFT — Code ══════════ -->
  <rect x="44" y="208" width="200" height="92" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <rect x="44" y="196" width="130" height="20" rx="5" fill="#b45309"/>
  <text x="109" y="210" text-anchor="middle" fill="#fef3c7" font-size="10" font-weight="700">💻  Code &amp; Terminal</text>
  <text x="54" y="240" fill="#fcd34d" font-size="11">• Run shell commands</text>
  <text x="54" y="256" fill="#fcd34d" font-size="11">• Manage background tasks</text>
  <text x="54" y="272" fill="#fcd34d" font-size="11">• Edit and create files</text>
  <text x="54" y="288" fill="#475569" font-size="10" font-style="italic">Sandbox required for safe use</text>

  <!-- ══════════ BOTTOM LEFT — Messaging ══════════ -->
  <rect x="94" y="338" width="200" height="92" rx="10" fill="#1e293b" stroke="#ec4899" stroke-width="2"/>
  <rect x="94" y="326" width="130" height="20" rx="5" fill="#9d174d"/>
  <text x="159" y="340" text-anchor="middle" fill="#fce7f3" font-size="10" font-weight="700">💬  Messaging</text>
  <text x="104" y="370" fill="#f9a8d4" font-size="11">• Send Telegram messages</text>
  <text x="104" y="386" fill="#f9a8d4" font-size="11">• Post to Slack / Discord</text>
  <text x="104" y="402" fill="#f9a8d4" font-size="11">• Send WhatsApp messages</text>
  <text x="104" y="418" fill="#475569" font-size="10" font-style="italic">Channel must be connected first</text>

  <!-- ══════════ TOP RIGHT — Files ══════════ -->
  <rect x="526" y="74" width="200" height="92" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <rect x="526" y="62" width="120" height="20" rx="5" fill="#065f46"/>
  <text x="586" y="76" text-anchor="middle" fill="#d1fae5" font-size="10" font-weight="700">📁  Files</text>
  <text x="536" y="106" fill="#6ee7b7" font-size="11">• Read files in workspace</text>
  <text x="536" y="122" fill="#6ee7b7" font-size="11">• Write and save files</text>
  <text x="536" y="138" fill="#6ee7b7" font-size="11">• Work with code &amp; docs</text>
  <text x="536" y="154" fill="#475569" font-size="10" font-style="italic">Workspace folder must be set</text>

  <!-- ══════════ MIDDLE RIGHT — Memory ══════════ -->
  <rect x="576" y="208" width="200" height="92" rx="10" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
  <rect x="576" y="196" width="120" height="20" rx="5" fill="#6b21a8"/>
  <text x="636" y="210" text-anchor="middle" fill="#f3e8ff" font-size="10" font-weight="700">🧠  Memory</text>
  <text x="586" y="240" fill="#d8b4fe" font-size="11">• Remember your name</text>
  <text x="586" y="256" fill="#d8b4fe" font-size="11">• Save facts between chats</text>
  <text x="586" y="272" fill="#d8b4fe" font-size="11">• Recall previous context</text>
  <text x="586" y="288" fill="#475569" font-size="10" font-style="italic">Memory extension must be on</text>

  <!-- ══════════ BOTTOM RIGHT — Sub-agents ══════════ -->
  <rect x="526" y="338" width="200" height="92" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <rect x="526" y="326" width="130" height="20" rx="5" fill="#991b1b"/>
  <text x="591" y="340" text-anchor="middle" fill="#fee2e2" font-size="10" font-weight="700">🤖  Sub-agents</text>
  <text x="536" y="370" fill="#fca5a5" font-size="11">• Spawn a new agent</text>
  <text x="536" y="386" fill="#fca5a5" font-size="11">• Delegate part of a task</text>
  <text x="536" y="402" fill="#fca5a5" font-size="11">• Run work in parallel</text>
  <text x="536" y="418" fill="#475569" font-size="10" font-style="italic">subagents.enabled must be true</text>

  <!-- Footer note -->
  <text x="410" y="472" text-anchor="middle" fill="#334155" font-size="11">Tools without a setup note work out of the box — others need the matching channel or feature enabled</text>

</svg>
