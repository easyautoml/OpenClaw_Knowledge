<svg xmlns="http://www.w3.org/2000/svg" width="820" height="300" viewBox="0 0 820 300" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="820" height="300" rx="16" fill="#0f1117"/>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">Tools and Skills — Two Sides of the Same Coin</text>
  <text x="410" y="46" text-anchor="middle" fill="#475569" font-size="11">Skills teach the LLM when and how — Tools are what actually runs</text>

  <!-- ══ Tools box (left, teal/green) ══ -->
  <rect x="30" y="62" width="340" height="200" rx="12" fill="#071a12" stroke="#10b981" stroke-width="2"/>
  <rect x="30" y="50" width="340" height="24" rx="6" fill="#065f46"/>
  <text x="200" y="67" text-anchor="middle" fill="#d1fae5" font-size="12" font-weight="700">Tools — The Doing Layer</text>

  <text x="200" y="108" text-anchor="middle" fill="#6ee7b7" font-size="28">⚙</text>
  <text x="200" y="136" text-anchor="middle" fill="#10b981" font-size="12" font-weight="600">Callable functions the agent runs</text>

  <line x1="50" y1="148" x2="350" y2="148" stroke="#134e3c" stroke-width="1"/>

  <text x="50" y="170" fill="#6ee7b7" font-size="11" font-weight="600">Examples:</text>
  <text x="50" y="188" fill="#64748b" font-size="10">exec       — run a shell command or script</text>
  <text x="50" y="204" fill="#64748b" font-size="10">web_search — search the internet</text>
  <text x="50" y="220" fill="#64748b" font-size="10">browser    — control a real web browser</text>
  <text x="50" y="236" fill="#64748b" font-size="10">read / write / edit — manage files</text>
  <text x="50" y="252" fill="#64748b" font-size="10">message    — send a reply to a user</text>

  <rect x="50" y="262" width="300" height="18" rx="4" fill="#0d2b1e"/>
  <text x="200" y="275" text-anchor="middle" fill="#34d399" font-size="10" font-style="italic">Enabled in config — agent calls them at runtime</text>

  <!-- ══ Middle divider with double arrow ══ -->
  <line x1="410" y1="100" x2="410" y2="240" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Top arrow: Skills → Tools (guides) -->
  <line x1="385" y1="150" x2="435" y2="150" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="433,144 443,150 433,156" fill="#a78bfa"/>
  <text x="410" y="143" text-anchor="middle" fill="#7c3aed" font-size="9">guides use</text>

  <!-- Bottom arrow: Tools → Skills (execution result) -->
  <line x1="435" y1="180" x2="385" y2="180" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="387,174 377,180 387,186" fill="#475569"/>
  <text x="410" y="197" text-anchor="middle" fill="#334155" font-size="9">output feeds</text>
  <text x="410" y="208" text-anchor="middle" fill="#334155" font-size="9">context back</text>

  <!-- ══ Skills box (right, purple/violet) ══ -->
  <rect x="450" y="62" width="340" height="200" rx="12" fill="#1a0d2e" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="450" y="50" width="340" height="24" rx="6" fill="#5b21b6"/>
  <text x="620" y="67" text-anchor="middle" fill="#ede9fe" font-size="12" font-weight="700">Skills — The Teaching Layer</text>

  <text x="620" y="108" text-anchor="middle" fill="#c4b5fd" font-size="28">📚</text>
  <text x="620" y="136" text-anchor="middle" fill="#8b5cf6" font-size="12" font-weight="600">SKILL.md files loaded into LLM context</text>

  <line x1="470" y1="148" x2="770" y2="148" stroke="#2e1b4e" stroke-width="1"/>

  <text x="470" y="170" fill="#c4b5fd" font-size="11" font-weight="600">Examples:</text>
  <text x="470" y="188" fill="#64748b" font-size="10">send-email   — when/how to send email via exec</text>
  <text x="470" y="204" fill="#64748b" font-size="10">daily-standup — post summaries each morning</text>
  <text x="470" y="220" fill="#64748b" font-size="10">code-review  — how to lint and comment on PRs</text>
  <text x="470" y="236" fill="#64748b" font-size="10">web-research  — when to search vs use memory</text>
  <text x="470" y="252" fill="#64748b" font-size="10">ClawHub skills — community-built, ready to install</text>

  <rect x="470" y="262" width="300" height="18" rx="4" fill="#1a0d2e"/>
  <text x="620" y="275" text-anchor="middle" fill="#a78bfa" font-size="10" font-style="italic">Placed in workspace — loaded before each LLM call</text>

</svg>
