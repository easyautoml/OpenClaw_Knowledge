<svg xmlns="http://www.w3.org/2000/svg" width="860" height="360" viewBox="0 0 860 360" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="860" height="360" rx="16" fill="#0f1117"/>

  <!-- Title -->
  <text x="430" y="26" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">OpenClaw ↔ Google Account — How It All Connects</text>
  <text x="430" y="44" text-anchor="middle" fill="#475569" font-size="11">Three integration paths — choose what you need</text>

  <!-- ══ OpenClaw box (left) ══ -->
  <rect x="20" y="58" width="180" height="272" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <rect x="20" y="46" width="180" height="22" rx="5" fill="#4338ca"/>
  <text x="110" y="61" text-anchor="middle" fill="#e0e7ff" font-size="11" font-weight="700">OpenClaw</text>
  <text x="110" y="98" text-anchor="middle" fill="#a5b4fc" font-size="22">⚙</text>
  <text x="110" y="120" text-anchor="middle" fill="#818cf8" font-size="10" font-weight="600">Your AI Agent</text>

  <line x1="35" y1="130" x2="185" y2="130" stroke="#334155" stroke-width="1"/>

  <rect x="35" y="140" width="150" height="24" rx="5" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-width="1"/>
  <text x="110" y="156" text-anchor="middle" fill="#6ee7b7" font-size="10">exec → gog CLI</text>

  <rect x="35" y="172" width="150" height="24" rx="5" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1"/>
  <text x="110" y="188" text-anchor="middle" fill="#fcd34d" font-size="10">webhook → Gmail inbox</text>

  <rect x="35" y="204" width="150" height="24" rx="5" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-width="1"/>
  <text x="110" y="220" text-anchor="middle" fill="#c4b5fd" font-size="10">channel → Google Chat</text>

  <text x="110" y="258" text-anchor="middle" fill="#475569" font-size="9">gog skill loaded</text>
  <text x="110" y="272" text-anchor="middle" fill="#475569" font-size="9">into LLM context</text>
  <text x="110" y="288" text-anchor="middle" fill="#334155" font-size="9" font-style="italic">Agent calls gog commands</text>
  <text x="110" y="302" text-anchor="middle" fill="#334155" font-size="9" font-style="italic">via the exec tool</text>

  <!-- ══ Middle: gog CLI + OAuth ══ -->
  <rect x="240" y="58" width="200" height="272" rx="12" fill="#071a12" stroke="#10b981" stroke-width="2"/>
  <rect x="240" y="46" width="200" height="22" rx="5" fill="#065f46"/>
  <text x="340" y="61" text-anchor="middle" fill="#d1fae5" font-size="11" font-weight="700">gog CLI (gogcli)</text>

  <text x="340" y="98" text-anchor="middle" fill="#6ee7b7" font-size="22">🔑</text>
  <text x="340" y="120" text-anchor="middle" fill="#10b981" font-size="10" font-weight="600">Google Workspace CLI</text>

  <line x1="255" y1="130" x2="425" y2="130" stroke="#134e3c" stroke-width="1"/>

  <text x="255" y="148" fill="#64748b" font-size="10" font-weight="600">Install:</text>
  <text x="255" y="163" fill="#475569" font-size="9">brew install steipete/tap/gogcli</text>
  <text x="255" y="178" fill="#475569" font-size="9">or download from gogcli.sh</text>

  <text x="255" y="196" fill="#64748b" font-size="10" font-weight="600">Auth (one time):</text>
  <text x="255" y="211" fill="#475569" font-size="9">gog auth credentials client.json</text>
  <text x="255" y="226" fill="#475569" font-size="9">gog auth add you@gmail.com \</text>
  <text x="255" y="239" fill="#475569" font-size="9">  --services gmail,calendar,drive</text>

  <text x="255" y="258" fill="#64748b" font-size="10" font-weight="600">Env var (optional):</text>
  <text x="255" y="273" fill="#475569" font-size="9">GOG_ACCOUNT=you@gmail.com</text>

  <rect x="255" y="284" width="170" height="30" rx="5" fill="#0d2b1e"/>
  <text x="340" y="300" text-anchor="middle" fill="#34d399" font-size="9" font-style="italic">OAuth tokens stored securely</text>
  <text x="340" y="313" text-anchor="middle" fill="#34d399" font-size="9" font-style="italic">in system keyring (GOG_KEYRING_PASSWORD)</text>

  <!-- Arrow: OpenClaw → gog CLI -->
  <line x1="202" y1="154" x2="238" y2="154" stroke="#10b981" stroke-width="2"/>
  <polygon points="236,148 246,154 236,160" fill="#10b981"/>
  <text x="220" y="148" text-anchor="middle" fill="#065f46" font-size="9">exec</text>

  <!-- ══ Right: Google APIs ══ -->
  <rect x="480" y="58" width="360" height="272" rx="12" fill="#1a0a00" stroke="#ea4335" stroke-width="2"/>
  <rect x="480" y="46" width="360" height="22" rx="5" fill="#b91c1c"/>
  <text x="660" y="61" text-anchor="middle" fill="#fee2e2" font-size="11" font-weight="700">Google APIs (Cloud Console)</text>

  <!-- Gmail -->
  <rect x="496" y="76" width="150" height="54" rx="7" fill="#0f1117" stroke="#ea4335" stroke-width="1"/>
  <text x="571" y="96" text-anchor="middle" fill="#fca5a5" font-size="18">✉</text>
  <text x="571" y="114" text-anchor="middle" fill="#f87171" font-size="10" font-weight="600">Gmail API</text>
  <text x="571" y="126" text-anchor="middle" fill="#475569" font-size="9">send · search · watch</text>

  <!-- Calendar -->
  <rect x="654" y="76" width="170" height="54" rx="7" fill="#0f1117" stroke="#34a853" stroke-width="1"/>
  <text x="739" y="96" text-anchor="middle" fill="#86efac" font-size="18">📅</text>
  <text x="739" y="114" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">Calendar API</text>
  <text x="739" y="126" text-anchor="middle" fill="#475569" font-size="9">events · create · update</text>

  <!-- Drive -->
  <rect x="496" y="140" width="150" height="54" rx="7" fill="#0f1117" stroke="#fbbc04" stroke-width="1"/>
  <text x="571" y="161" text-anchor="middle" fill="#fde68a" font-size="18">💾</text>
  <text x="571" y="178" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">Drive API</text>
  <text x="571" y="190" text-anchor="middle" fill="#475569" font-size="9">search · download</text>

  <!-- Sheets + Docs -->
  <rect x="654" y="140" width="170" height="54" rx="7" fill="#0f1117" stroke="#4285f4" stroke-width="1"/>
  <text x="739" y="161" text-anchor="middle" fill="#93c5fd" font-size="18">📊</text>
  <text x="739" y="178" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="600">Sheets + Docs</text>
  <text x="739" y="190" text-anchor="middle" fill="#475569" font-size="9">read · write · export</text>

  <!-- Contacts -->
  <rect x="496" y="204" width="150" height="54" rx="7" fill="#0f1117" stroke="#8b5cf6" stroke-width="1"/>
  <text x="571" y="224" text-anchor="middle" fill="#c4b5fd" font-size="18">👤</text>
  <text x="571" y="242" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">Contacts API</text>
  <text x="571" y="254" text-anchor="middle" fill="#475569" font-size="9">list · search</text>

  <!-- Pub/Sub -->
  <rect x="654" y="204" width="170" height="54" rx="7" fill="#0f1117" stroke="#f59e0b" stroke-width="1"/>
  <text x="739" y="224" text-anchor="middle" fill="#fcd34d" font-size="18">📡</text>
  <text x="739" y="242" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600">Pub/Sub API</text>
  <text x="739" y="254" text-anchor="middle" fill="#475569" font-size="9">push Gmail events to OpenClaw</text>

  <!-- Arrow: gog CLI → Google APIs -->
  <line x1="442" y1="154" x2="478" y2="154" stroke="#10b981" stroke-width="2"/>
  <polygon points="476,148 486,154 476,160" fill="#10b981"/>
  <text x="460" y="148" text-anchor="middle" fill="#065f46" font-size="9">OAuth</text>

  <!-- ══ Footer ══ -->
  <rect x="20" y="342" width="820" height="14" rx="4" fill="#1e293b"/>
  <text x="430" y="353" text-anchor="middle" fill="#475569" font-size="10">All access uses OAuth 2.0 — credentials come from a client_secret.json created in Google Cloud Console</text>

</svg>
