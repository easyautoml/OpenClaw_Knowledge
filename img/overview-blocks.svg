<svg viewBox="0 0 800 575" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">

  <!-- Background -->
  <rect width="800" height="575" fill="#080b16" rx="14"/>

  <!-- ══════════════════════════════════════════
       Row 1 — CHANNEL
  ══════════════════════════════════════════ -->
  <rect x="20" y="18" width="760" height="78" rx="10" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- left accent bar -->
  <rect x="20" y="18" width="6" height="78" rx="3" fill="#3b82f6"/>
  <!-- icon: signal waves -->
  <circle cx="56" cy="57" r="5" fill="#3b82f6"/>
  <path d="M 44 69 Q 56 44 68 69" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 38 75 Q 56 36 74 75" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
  <!-- labels -->
  <text x="86" y="47" fill="#93c5fd" font-size="12" font-weight="700" letter-spacing="0.5">CHANNEL — The Messenger</text>
  <text x="86" y="64" fill="#6b7280" font-size="12">Receives messages from your apps · delivers replies back to the user</text>
  <text x="86" y="82" fill="#374151" font-size="11">Telegram · Slack · Discord · WhatsApp · Signal · iMessage · Teams · +40 platforms</text>

  <!-- ── connector ── -->
  <line x1="400" y1="98" x2="400" y2="112" stroke="#1f2937" stroke-width="2"/>
  <polygon points="394,109 400,118 406,109" fill="#1f2937"/>

  <!-- ══════════════════════════════════════════
       Row 2 — GATEWAY
  ══════════════════════════════════════════ -->
  <rect x="20" y="120" width="760" height="78" rx="10" fill="#0f172a" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="20" y="120" width="6" height="78" rx="3" fill="#22c55e"/>
  <!-- icon: hub dot with lines -->
  <circle cx="56" cy="159" r="6" fill="#22c55e"/>
  <line x1="56" y1="139" x2="56" y2="153" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="56" y1="165" x2="56" y2="179" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="36" y1="159" x2="50" y2="159" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="62" y1="159" x2="76" y2="159" stroke="#22c55e" stroke-width="1.5"/>
  <!-- labels -->
  <text x="92" y="148" fill="#86efac" font-size="12" font-weight="700" letter-spacing="0.5">GATEWAY — The Server</text>
  <text x="92" y="165" fill="#6b7280" font-size="12">The always-on hub that routes every message to the right agent</text>
  <text x="92" y="183" fill="#374151" font-size="11">HTTP + WebSocket · Cron scheduler · Plugin routes · Canvas host · REST API</text>

  <!-- ── connector ── -->
  <line x1="400" y1="200" x2="400" y2="214" stroke="#1f2937" stroke-width="2"/>
  <polygon points="394,211 400,220 406,211" fill="#1f2937"/>

  <!-- ══════════════════════════════════════════
       Row 3 — AGENT
  ══════════════════════════════════════════ -->
  <rect x="20" y="222" width="760" height="78" rx="10" fill="#0f172a" stroke="#a855f7" stroke-width="1.5"/>
  <rect x="20" y="222" width="6" height="78" rx="3" fill="#a855f7"/>
  <!-- icon: person in circle -->
  <circle cx="56" cy="261" r="13" fill="none" stroke="#a855f7" stroke-width="1.5"/>
  <circle cx="56" cy="255" r="5" fill="none" stroke="#c084fc" stroke-width="1.5"/>
  <path d="M 44 270 Q 56 263 68 270" fill="none" stroke="#c084fc" stroke-width="1.5" stroke-linecap="round"/>
  <!-- labels -->
  <text x="86" y="250" fill="#d8b4fe" font-size="12" font-weight="700" letter-spacing="0.5">AGENT — The Runner</text>
  <text x="86" y="267" fill="#6b7280" font-size="12">Assembles the prompt · calls the LLM · runs tools · delivers the reply</text>
  <text x="86" y="285" fill="#374151" font-size="11">Named identity · Workspace · AGENTS.md / SOUL.md · Multi-agent support</text>

  <!-- ── connector ── -->
  <line x1="400" y1="302" x2="400" y2="316" stroke="#1f2937" stroke-width="2"/>
  <polygon points="394,313 400,322 406,313" fill="#1f2937"/>

  <!-- ══════════════════════════════════════════
       Row 4 — TOOLS + SKILLS
  ══════════════════════════════════════════ -->
  <rect x="20" y="324" width="760" height="78" rx="10" fill="#0f172a" stroke="#eab308" stroke-width="1.5"/>
  <rect x="20" y="324" width="6" height="78" rx="3" fill="#eab308"/>
  <!-- icon: wrench shape (simple) -->
  <rect x="48" y="350" width="5" height="22" rx="2" fill="#eab308" transform="rotate(-40 50 361)"/>
  <circle cx="56" cy="349" r="7" fill="none" stroke="#eab308" stroke-width="1.5"/>
  <circle cx="56" cy="349" r="3" fill="#eab308"/>
  <!-- labels -->
  <text x="86" y="352" fill="#fde68a" font-size="12" font-weight="700" letter-spacing="0.5">TOOLS + SKILLS — What the Agent Can Do</text>
  <text x="86" y="369" fill="#6b7280" font-size="12">Tools execute real actions · Skills teach the LLM how to use them for your setup</text>
  <text x="86" y="387" fill="#374151" font-size="11">exec · web_search · browser · read/write · memory · SKILL.md files · ClawHub marketplace</text>

  <!-- ── connector ── -->
  <line x1="400" y1="404" x2="400" y2="418" stroke="#1f2937" stroke-width="2"/>
  <polygon points="394,415 400,424 406,415" fill="#1f2937"/>

  <!-- ══════════════════════════════════════════
       Row 5 — LLM
  ══════════════════════════════════════════ -->
  <rect x="20" y="426" width="760" height="78" rx="10" fill="#0f172a" stroke="#6366f1" stroke-width="1.5"/>
  <rect x="20" y="426" width="6" height="78" rx="3" fill="#6366f1"/>
  <!-- icon: brain-like rings -->
  <circle cx="56" cy="465" r="14" fill="none" stroke="#818cf8" stroke-width="1.5"/>
  <circle cx="56" cy="465" r="8" fill="none" stroke="#818cf8" stroke-width="1"/>
  <circle cx="56" cy="465" r="3" fill="#818cf8"/>
  <!-- labels -->
  <text x="86" y="454" fill="#a5b4fc" font-size="12" font-weight="700" letter-spacing="0.5">LLM — The Brain</text>
  <text x="86" y="471" fill="#6b7280" font-size="12">The AI model that reads messages and generates intelligent replies</text>
  <text x="86" y="489" fill="#374151" font-size="11">Claude · GPT-4o · Gemini · Ollama (local, no API key) · Mistral · Qwen · +30 providers</text>

  <!-- ══════════════════════════════════════════
       Row 6 — PLUGINS (dashed border, footer)
  ══════════════════════════════════════════ -->
  <rect x="8" y="518" width="784" height="48" rx="10" fill="none" stroke="#f97316" stroke-width="1.5" stroke-dasharray="8,4"/>
  <!-- icon: puzzle piece text substitute -->
  <text x="34" y="538" fill="#f97316" font-size="14" font-weight="700">{ }</text>
  <text x="70" y="538" fill="#fb923c" font-size="12" font-weight="700" letter-spacing="0.5">PLUGINS — The Extension System</text>
  <text x="70" y="556" fill="#6b7280" font-size="11">Adds tools · channels · hooks · CLI commands · services · providers — without touching core code</text>

  <!-- "wraps all" side labels -->
  <text x="789" y="300" fill="#f97316" font-size="9" opacity="0.5" writing-mode="tb" text-anchor="middle">extends all layers</text>

</svg>
