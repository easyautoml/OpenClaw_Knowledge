<svg xmlns="http://www.w3.org/2000/svg" width="820" height="230" viewBox="0 0 820 230" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="820" height="230" rx="16" fill="#0f1117"/>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">The Setup Journey</text>
  <text x="410" y="46" text-anchor="middle" fill="#475569" font-size="11">Four steps — do them in order, once each. After that, OpenClaw runs automatically.</text>

  <!-- ══════════ Step 1 — Install — x=20, w=165 ══════════ -->
  <rect x="20" y="62" width="165" height="134" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <rect x="20" y="50" width="165" height="24" rx="6" fill="#1d4ed8"/>
  <circle cx="38" cy="62" r="11" fill="#3b82f6"/>
  <text x="38" y="67" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>
  <text x="110" y="67" text-anchor="middle" fill="#bfdbfe" font-size="11" font-weight="700">Install</text>
  <text x="102" y="102" text-anchor="middle" fill="#93c5fd" font-size="20">📦</text>
  <text x="102" y="130" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">Install OpenClaw</text>
  <text x="102" y="150" text-anchor="middle" fill="#64748b" font-size="10">npm install -g openclaw</text>
  <text x="102" y="166" text-anchor="middle" fill="#64748b" font-size="10">openclaw onboard</text>
  <text x="102" y="184" text-anchor="middle" fill="#475569" font-size="10" font-style="italic">Node 22+ required</text>

  <!-- Arrow 1→2 -->
  <line x1="187" y1="130" x2="223" y2="130" stroke="#334155" stroke-width="2"/>
  <polygon points="221,124 231,130 221,136" fill="#334155"/>

  <!-- ══════════ Step 2 — Add LLM — x=233, w=165 ══════════ -->
  <rect x="233" y="62" width="165" height="134" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="233" y="50" width="165" height="24" rx="6" fill="#6d28d9"/>
  <circle cx="251" cy="62" r="11" fill="#8b5cf6"/>
  <text x="251" y="67" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>
  <text x="323" y="67" text-anchor="middle" fill="#ede9fe" font-size="11" font-weight="700">Add LLM</text>
  <text x="315" y="102" text-anchor="middle" fill="#c4b5fd" font-size="20">🧠</text>
  <text x="315" y="130" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">Connect an AI model</text>
  <text x="315" y="150" text-anchor="middle" fill="#64748b" font-size="10">openclaw llm add</text>
  <text x="315" y="166" text-anchor="middle" fill="#64748b" font-size="10">API key or local model</text>
  <text x="315" y="184" text-anchor="middle" fill="#475569" font-size="10" font-style="italic">See 02_LLM.md</text>

  <!-- Arrow 2→3 -->
  <line x1="400" y1="130" x2="436" y2="130" stroke="#334155" stroke-width="2"/>
  <polygon points="434,124 444,130 434,136" fill="#334155"/>

  <!-- ══════════ Step 3 — Add Agent — x=446, w=165 ══════════ -->
  <rect x="446" y="62" width="165" height="134" rx="10" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
  <rect x="446" y="50" width="165" height="24" rx="6" fill="#7c3aed"/>
  <circle cx="464" cy="62" r="11" fill="#a855f7"/>
  <text x="464" y="67" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>
  <text x="536" y="67" text-anchor="middle" fill="#f3e8ff" font-size="11" font-weight="700">Add Agent</text>
  <text x="528" y="102" text-anchor="middle" fill="#d8b4fe" font-size="20">⚙</text>
  <text x="528" y="130" text-anchor="middle" fill="#d8b4fe" font-size="11" font-weight="600">Set up your assistant</text>
  <text x="528" y="150" text-anchor="middle" fill="#64748b" font-size="10">openclaw agents add</text>
  <text x="528" y="166" text-anchor="middle" fill="#64748b" font-size="10">workspace &amp; skills</text>
  <text x="528" y="184" text-anchor="middle" fill="#475569" font-size="10" font-style="italic">See 03_AGENTS.md</text>

  <!-- Arrow 3→4 -->
  <line x1="613" y1="130" x2="649" y2="130" stroke="#334155" stroke-width="2"/>
  <polygon points="647,124 657,130 647,136" fill="#334155"/>

  <!-- ══════════ Step 4 — Connect Channel — x=659, w=141 ══════════ -->
  <rect x="659" y="62" width="141" height="134" rx="10" fill="#071a0e" stroke="#10b981" stroke-width="2.5"/>
  <rect x="659" y="50" width="141" height="24" rx="6" fill="#065f46"/>
  <circle cx="677" cy="62" r="11" fill="#10b981"/>
  <text x="677" y="67" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text>
  <text x="747" y="67" text-anchor="middle" fill="#d1fae5" font-size="11" font-weight="700">Connect Channel</text>
  <text x="729" y="102" text-anchor="middle" fill="#6ee7b7" font-size="20">💬</text>
  <text x="729" y="130" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">Link your chat app</text>
  <text x="729" y="150" text-anchor="middle" fill="#64748b" font-size="10">Telegram · Slack</text>
  <text x="729" y="166" text-anchor="middle" fill="#64748b" font-size="10">Discord · WhatsApp</text>
  <text x="729" y="184" text-anchor="middle" fill="#475569" font-size="10" font-style="italic">See 04_CHANNELS.md</text>

</svg>
