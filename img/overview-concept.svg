<svg xmlns="http://www.w3.org/2000/svg" width="820" height="340" viewBox="0 0 820 340" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="820" height="340" rx="16" fill="#0f1117"/>

  <!-- Title -->
  <text x="410" y="30" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">How OpenClaw Works</text>
  <text x="410" y="48" text-anchor="middle" fill="#475569" font-size="11">Your message travels through three layers — Channel routes it, Agent decides what to do, LLM generates the reply</text>

  <!-- ══════════ YOU — x=20, w=120 ══════════ -->
  <rect x="20" y="68" width="120" height="192" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <rect x="20" y="56" width="120" height="24" rx="6" fill="#1d4ed8"/>
  <text x="80" y="73" text-anchor="middle" fill="#bfdbfe" font-size="11" font-weight="700">You</text>
  <text x="80" y="114" text-anchor="middle" fill="#93c5fd" font-size="26">👤</text>
  <text x="80" y="150" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">Any device</text>
  <text x="80" y="170" text-anchor="middle" fill="#64748b" font-size="10">Send a message</text>
  <text x="80" y="186" text-anchor="middle" fill="#64748b" font-size="10">Receive a reply</text>
  <text x="80" y="246" text-anchor="middle" fill="#475569" font-size="10" font-style="italic">The starting point</text>

  <!-- Arrow 1: You → Channel -->
  <line x1="142" y1="156" x2="185" y2="156" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="183,150 193,156 183,162" fill="#3b82f6"/>

  <!-- ══════════ CHANNEL — x=195, w=170 ══════════ -->
  <rect x="195" y="68" width="170" height="192" rx="12" fill="#1e1b3a" stroke="#6366f1" stroke-width="2"/>
  <rect x="195" y="56" width="170" height="24" rx="6" fill="#4338ca"/>
  <text x="280" y="73" text-anchor="middle" fill="#e0e7ff" font-size="11" font-weight="700">Channel</text>
  <text x="280" y="112" text-anchor="middle" fill="#a5b4fc" font-size="22">💬</text>
  <text x="280" y="144" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="700">Your messaging app</text>
  <text x="280" y="166" text-anchor="middle" fill="#64748b" font-size="10">Telegram · WhatsApp</text>
  <text x="280" y="182" text-anchor="middle" fill="#64748b" font-size="10">Slack · Discord</text>
  <text x="280" y="198" text-anchor="middle" fill="#64748b" font-size="10">Signal · iMessage</text>
  <text x="280" y="214" text-anchor="middle" fill="#64748b" font-size="10">+ 40 more</text>
  <text x="280" y="246" text-anchor="middle" fill="#475569" font-size="10" font-style="italic">Routes messages in / out</text>

  <!-- Arrow 2: Channel → Agent -->
  <line x1="367" y1="156" x2="408" y2="156" stroke="#6366f1" stroke-width="2"/>
  <polygon points="406,150 416,156 406,162" fill="#6366f1"/>

  <!-- ══════════ AGENT — x=418, w=185 ══════════ -->
  <rect x="418" y="68" width="185" height="192" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="418" y="56" width="185" height="24" rx="6" fill="#6d28d9"/>
  <text x="510" y="73" text-anchor="middle" fill="#ede9fe" font-size="11" font-weight="700">Agent</text>
  <text x="510" y="112" text-anchor="middle" fill="#c4b5fd" font-size="22">⚙</text>
  <text x="510" y="144" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="700">The runner</text>
  <text x="510" y="166" text-anchor="middle" fill="#64748b" font-size="10">Receives your message</text>
  <text x="510" y="182" text-anchor="middle" fill="#64748b" font-size="10">Decides what to do</text>
  <text x="510" y="198" text-anchor="middle" fill="#64748b" font-size="10">Uses tools &amp; skills</text>
  <text x="510" y="214" text-anchor="middle" fill="#64748b" font-size="10">Has a workspace</text>
  <text x="510" y="246" text-anchor="middle" fill="#475569" font-size="10" font-style="italic">The brains of the operation</text>

  <!-- Arrow 3: Agent → LLM -->
  <line x1="605" y1="156" x2="646" y2="156" stroke="#8b5cf6" stroke-width="2"/>
  <polygon points="644,150 654,156 644,162" fill="#8b5cf6"/>

  <!-- ══════════ LLM — x=656, w=148 ══════════ -->
  <rect x="656" y="68" width="148" height="192" rx="12" fill="#1a0d26" stroke="#a855f7" stroke-width="2"/>
  <rect x="656" y="56" width="148" height="24" rx="6" fill="#7c3aed"/>
  <text x="730" y="73" text-anchor="middle" fill="#f3e8ff" font-size="11" font-weight="700">LLM</text>
  <text x="730" y="112" text-anchor="middle" fill="#d8b4fe" font-size="22">🧠</text>
  <text x="730" y="144" text-anchor="middle" fill="#d8b4fe" font-size="12" font-weight="700">The AI brain</text>
  <text x="730" y="166" text-anchor="middle" fill="#64748b" font-size="10">Claude · GPT · Gemini</text>
  <text x="730" y="182" text-anchor="middle" fill="#64748b" font-size="10">Ollama (local)</text>
  <text x="730" y="198" text-anchor="middle" fill="#64748b" font-size="10">30+ providers</text>
  <text x="730" y="246" text-anchor="middle" fill="#475569" font-size="10" font-style="italic">Generates the reply</text>

  <!-- Footer: reply note -->
  <rect x="110" y="283" width="600" height="18" rx="4" fill="#1e293b"/>
  <text x="410" y="296" text-anchor="middle" fill="#475569" font-size="10">The reply follows the same path back — LLM → Agent → Channel → You</text>

</svg>
