<svg xmlns="http://www.w3.org/2000/svg" width="860" height="260" viewBox="0 0 860 260" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="860" height="260" rx="16" fill="#0f1117"/>

  <!-- Title -->
  <text x="430" y="26" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">Setup Flow — Google Cloud → gogcli → OpenClaw</text>
  <text x="430" y="44" text-anchor="middle" fill="#475569" font-size="11">Do these 5 steps once — then OpenClaw can access Gmail, Calendar, Drive, and more</text>

  <!-- Step 1: GCP Project (blue) -->
  <rect x="20" y="66" width="148" height="140" rx="10" fill="#0c1a2e" stroke="#3b82f6" stroke-width="2"/>
  <rect x="20" y="54" width="148" height="22" rx="5" fill="#1d4ed8"/>
  <circle cx="38" cy="66" r="11" fill="#3b82f6"/>
  <text x="38" y="71" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>
  <text x="94" y="71" text-anchor="middle" fill="#bfdbfe" font-size="10" font-weight="700">GCP Project</text>

  <text x="94" y="102" text-anchor="middle" fill="#93c5fd" font-size="20">☁</text>
  <text x="94" y="126" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">Create project</text>
  <text x="30" y="144" fill="#64748b" font-size="9">console.cloud.google.com</text>
  <text x="30" y="157" fill="#64748b" font-size="9">Enable billing</text>
  <text x="30" y="170" fill="#64748b" font-size="9">Enable APIs:</text>
  <text x="30" y="183" fill="#475569" font-size="9">gmail / calendar / drive</text>
  <text x="30" y="196" fill="#475569" font-size="9">contacts / sheets / docs</text>

  <!-- Arrow 1→2 -->
  <line x1="170" y1="136" x2="188" y2="136" stroke="#475569" stroke-width="2"/>
  <polygon points="186,130 196,136 186,142" fill="#475569"/>

  <!-- Step 2: OAuth Credentials (amber) -->
  <rect x="196" y="66" width="148" height="140" rx="10" fill="#1c1408" stroke="#f59e0b" stroke-width="2"/>
  <rect x="196" y="54" width="148" height="22" rx="5" fill="#b45309"/>
  <circle cx="214" cy="66" r="11" fill="#f59e0b"/>
  <text x="214" y="71" text-anchor="middle" fill="#0f1117" font-size="11" font-weight="700">2</text>
  <text x="270" y="71" text-anchor="middle" fill="#fef3c7" font-size="10" font-weight="700">OAuth Credentials</text>

  <text x="270" y="102" text-anchor="middle" fill="#fcd34d" font-size="20">🔑</text>
  <text x="270" y="126" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">client_secret.json</text>
  <text x="206" y="144" fill="#64748b" font-size="9">APIs &amp; Services</text>
  <text x="206" y="157" fill="#64748b" font-size="9">→ Credentials</text>
  <text x="206" y="170" fill="#64748b" font-size="9">→ OAuth 2.0 Client ID</text>
  <text x="206" y="183" fill="#64748b" font-size="9">Type: Desktop app</text>
  <text x="206" y="196" fill="#475569" font-size="9">Download JSON file</text>

  <!-- Arrow 2→3 -->
  <line x1="346" y1="136" x2="364" y2="136" stroke="#475569" stroke-width="2"/>
  <polygon points="362,130 372,136 362,142" fill="#475569"/>

  <!-- Step 3: Install gogcli (purple) -->
  <rect x="372" y="66" width="148" height="140" rx="10" fill="#1a0d2e" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="372" y="54" width="148" height="22" rx="5" fill="#5b21b6"/>
  <circle cx="390" cy="66" r="11" fill="#8b5cf6"/>
  <text x="390" y="71" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>
  <text x="446" y="71" text-anchor="middle" fill="#ede9fe" font-size="10" font-weight="700">Install gogcli</text>

  <text x="446" y="102" text-anchor="middle" fill="#c4b5fd" font-size="20">📦</text>
  <text x="446" y="126" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">gog CLI tool</text>
  <text x="382" y="144" fill="#64748b" font-size="9">macOS:</text>
  <text x="382" y="157" fill="#475569" font-size="9">brew install</text>
  <text x="382" y="170" fill="#475569" font-size="9">steipete/tap/gogcli</text>
  <text x="382" y="183" fill="#64748b" font-size="9">Linux / other:</text>
  <text x="382" y="196" fill="#475569" font-size="9">gogcli.sh</text>

  <!-- Arrow 3→4 -->
  <line x1="522" y1="136" x2="540" y2="136" stroke="#475569" stroke-width="2"/>
  <polygon points="538,130 548,136 538,142" fill="#475569"/>

  <!-- Step 4: Authorize Account (indigo) -->
  <rect x="548" y="66" width="148" height="140" rx="10" fill="#1e1b3a" stroke="#6366f1" stroke-width="2"/>
  <rect x="548" y="54" width="148" height="22" rx="5" fill="#4338ca"/>
  <circle cx="566" cy="66" r="11" fill="#6366f1"/>
  <text x="566" y="71" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text>
  <text x="622" y="71" text-anchor="middle" fill="#e0e7ff" font-size="10" font-weight="700">Authorize Account</text>

  <text x="622" y="102" text-anchor="middle" fill="#a5b4fc" font-size="20">✅</text>
  <text x="622" y="126" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600">OAuth browser flow</text>
  <text x="558" y="144" fill="#64748b" font-size="9">gog auth credentials \</text>
  <text x="558" y="157" fill="#475569" font-size="9">  client_secret.json</text>
  <text x="558" y="170" fill="#64748b" font-size="9">gog auth add</text>
  <text x="558" y="183" fill="#475569" font-size="9">  you@gmail.com \</text>
  <text x="558" y="196" fill="#475569" font-size="9">  --services gmail,calendar...</text>

  <!-- Arrow 4→5 -->
  <line x1="698" y1="136" x2="716" y2="136" stroke="#475569" stroke-width="2"/>
  <polygon points="714,130 724,136 714,142" fill="#475569"/>

  <!-- Step 5: Install gog Skill (green) -->
  <rect x="724" y="66" width="116" height="140" rx="10" fill="#071a12" stroke="#10b981" stroke-width="2.5"/>
  <rect x="724" y="54" width="116" height="22" rx="5" fill="#065f46"/>
  <circle cx="742" cy="66" r="11" fill="#10b981"/>
  <text x="742" y="71" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">5</text>
  <text x="782" y="71" text-anchor="middle" fill="#d1fae5" font-size="10" font-weight="700">Install Skill</text>

  <text x="782" y="102" text-anchor="middle" fill="#6ee7b7" font-size="20">📚</text>
  <text x="782" y="126" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">gog skill in OpenClaw</text>
  <text x="734" y="144" fill="#64748b" font-size="9">clawhub install gog</text>
  <text x="734" y="160" fill="#64748b" font-size="9">or copy from</text>
  <text x="734" y="174" fill="#475569" font-size="9">skills/gog/SKILL.md</text>
  <text x="734" y="190" fill="#10b981" font-size="9" font-weight="600">Done — agent can</text>
  <text x="734" y="203" fill="#10b981" font-size="9" font-weight="600">now use Google!</text>

  <!-- Footer -->
  <rect x="20" y="220" width="820" height="30" rx="6" fill="#1e293b"/>
  <text x="430" y="234" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">After Step 5: ask your agent "Check my calendar for today" or "Search my Gmail for receipts"</text>
  <text x="430" y="246" text-anchor="middle" fill="#475569" font-size="10">The agent uses gog CLI via the exec tool — no extra config needed</text>

</svg>
