<svg xmlns="http://www.w3.org/2000/svg" width="740" height="870" viewBox="0 0 740 870" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="740" height="870" rx="16" fill="#0f1117"/>

  <!-- Title -->
  <text x="370" y="34" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">How OpenClaw Picks Which LLM to Use</text>
  <text x="370" y="52" text-anchor="middle" fill="#475569" font-size="11">Checks each source in order — first key found wins</text>

  <!-- START -->
  <rect x="155" y="64" width="150" height="32" rx="16" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="230" y="84" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">START</text>
  <line x1="230" y1="96" x2="230" y2="108" stroke="#475569" stroke-width="1.5"/>
  <polygon points="225,106 230,114 235,106" fill="#475569"/>

  <!-- ═══════════════════════════════════
       LEVEL 1 — ENV vars
  ═══════════════════════════════════ -->
  <!-- Check box -->
  <rect x="60" y="114" width="340" height="38" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="230" y="133" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">Check ENV vars / .env file</text>
  <text x="230" y="147" text-anchor="middle" fill="#60a5fa" font-size="10">ANTHROPIC_API_KEY, OPENAI_API_KEY, GEMINI_API_KEY …</text>
  <!-- connector to diamond -->
  <line x1="230" y1="152" x2="230" y2="164" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Diamond -->
  <polygon points="230,164 300,191 230,218 160,191" fill="#172554" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="230" y="187" text-anchor="middle" fill="#bfdbfe" font-size="11" font-weight="700">Key found?</text>
  <!-- YES arrow right -->
  <line x1="300" y1="191" x2="390" y2="191" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="388,186 396,191 388,196" fill="#22c55e"/>
  <text x="342" y="184" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="700">YES</text>
  <!-- YES box -->
  <rect x="396" y="171" width="300" height="40" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="546" y="187" text-anchor="middle" fill="#bbf7d0" font-size="11" font-weight="700">Provider activated</text>
  <text x="546" y="203" text-anchor="middle" fill="#86efac" font-size="10">LLM ready to use</text>
  <!-- NO arrow down -->
  <line x1="230" y1="218" x2="230" y2="238" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="225,236 230,244 235,236" fill="#ef4444"/>
  <text x="244" y="233" fill="#ef4444" font-size="10" font-weight="700">NO</text>

  <!-- ═══════════════════════════════════
       LEVEL 2 — auth profiles
  ═══════════════════════════════════ -->
  <rect x="60" y="244" width="340" height="38" rx="8" fill="#1e1b3a" stroke="#6366f1" stroke-width="1.5"/>
  <text x="230" y="263" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="700">Check auth-profiles.json</text>
  <text x="230" y="277" text-anchor="middle" fill="#818cf8" font-size="10">Keys saved via wizard → ~/.openclaw/auth-profiles.json</text>
  <line x1="230" y1="282" x2="230" y2="294" stroke="#6366f1" stroke-width="1.5"/>
  <!-- Diamond -->
  <polygon points="230,294 300,321 230,348 160,321" fill="#1e1b3a" stroke="#6366f1" stroke-width="1.5"/>
  <text x="230" y="317" text-anchor="middle" fill="#c7d2fe" font-size="11" font-weight="700">Key found?</text>
  <!-- YES -->
  <line x1="300" y1="321" x2="390" y2="321" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="388,316 396,321 388,326" fill="#22c55e"/>
  <text x="342" y="314" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="700">YES</text>
  <rect x="396" y="301" width="300" height="40" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="546" y="317" text-anchor="middle" fill="#bbf7d0" font-size="11" font-weight="700">Provider activated</text>
  <text x="546" y="333" text-anchor="middle" fill="#86efac" font-size="10">LLM ready to use</text>
  <!-- NO -->
  <line x1="230" y1="348" x2="230" y2="368" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="225,366 230,374 235,366" fill="#ef4444"/>
  <text x="244" y="363" fill="#ef4444" font-size="10" font-weight="700">NO</text>

  <!-- ═══════════════════════════════════
       LEVEL 3 — OAuth
  ═══════════════════════════════════ -->
  <rect x="60" y="374" width="340" height="38" rx="8" fill="#2d1a3d" stroke="#a855f7" stroke-width="1.5"/>
  <text x="230" y="393" text-anchor="middle" fill="#d8b4fe" font-size="11" font-weight="700">Check OAuth login tokens</text>
  <text x="230" y="407" text-anchor="middle" fill="#c084fc" font-size="10">GitHub Copilot · MiniMax Portal · Qwen Portal · OpenAI Codex</text>
  <line x1="230" y1="412" x2="230" y2="424" stroke="#a855f7" stroke-width="1.5"/>
  <!-- Diamond -->
  <polygon points="230,424 300,451 230,478 160,451" fill="#1e0a2e" stroke="#a855f7" stroke-width="1.5"/>
  <text x="230" y="447" text-anchor="middle" fill="#e9d5ff" font-size="11" font-weight="700">Token found?</text>
  <!-- YES -->
  <line x1="300" y1="451" x2="390" y2="451" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="388,446 396,451 388,456" fill="#22c55e"/>
  <text x="342" y="444" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="700">YES</text>
  <rect x="396" y="431" width="300" height="40" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="546" y="447" text-anchor="middle" fill="#bbf7d0" font-size="11" font-weight="700">Provider activated</text>
  <text x="546" y="463" text-anchor="middle" fill="#86efac" font-size="10">LLM ready to use</text>
  <!-- NO -->
  <line x1="230" y1="478" x2="230" y2="498" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="225,496 230,504 235,496" fill="#ef4444"/>
  <text x="244" y="493" fill="#ef4444" font-size="10" font-weight="700">NO</text>

  <!-- ═══════════════════════════════════
       LEVEL 4 — Local services
  ═══════════════════════════════════ -->
  <rect x="60" y="504" width="340" height="38" rx="8" fill="#271f0a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="230" y="523" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="700">Check local running services</text>
  <text x="230" y="537" text-anchor="middle" fill="#fbbf24" font-size="10">Ollama · vLLM · SGLang — detected at http://localhost</text>
  <line x1="230" y1="542" x2="230" y2="554" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- Diamond -->
  <polygon points="230,554 300,581 230,608 160,581" fill="#1c1409" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="230" y="577" text-anchor="middle" fill="#fef3c7" font-size="11" font-weight="700">Service running?</text>
  <!-- YES -->
  <line x1="300" y1="581" x2="390" y2="581" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="388,576 396,581 388,586" fill="#22c55e"/>
  <text x="342" y="574" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="700">YES</text>
  <rect x="396" y="561" width="300" height="40" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="546" y="577" text-anchor="middle" fill="#bbf7d0" font-size="11" font-weight="700">Provider activated</text>
  <text x="546" y="593" text-anchor="middle" fill="#86efac" font-size="10">LLM ready to use</text>
  <!-- NO -->
  <line x1="230" y1="608" x2="230" y2="628" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="225,626 230,634 235,626" fill="#ef4444"/>
  <text x="244" y="623" fill="#ef4444" font-size="10" font-weight="700">NO</text>

  <!-- ═══════════════════════════════════
       LEVEL 5 — AWS Bedrock
  ═══════════════════════════════════ -->
  <rect x="60" y="634" width="340" height="38" rx="8" fill="#1a1212" stroke="#f87171" stroke-width="1.5"/>
  <text x="230" y="653" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">Check AWS credentials</text>
  <text x="230" y="667" text-anchor="middle" fill="#f87171" font-size="10">AWS_ACCESS_KEY_ID / AWS_PROFILE → Amazon Bedrock</text>
  <line x1="230" y1="672" x2="230" y2="684" stroke="#f87171" stroke-width="1.5"/>
  <!-- Diamond -->
  <polygon points="230,684 300,711 230,738 160,711" fill="#1a0a0a" stroke="#f87171" stroke-width="1.5"/>
  <text x="230" y="707" text-anchor="middle" fill="#fecaca" font-size="11" font-weight="700">Creds found?</text>
  <!-- YES -->
  <line x1="300" y1="711" x2="390" y2="711" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="388,706 396,711 388,716" fill="#22c55e"/>
  <text x="342" y="704" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="700">YES</text>
  <rect x="396" y="691" width="300" height="40" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="546" y="707" text-anchor="middle" fill="#bbf7d0" font-size="11" font-weight="700">Bedrock activated</text>
  <text x="546" y="723" text-anchor="middle" fill="#86efac" font-size="10">LLM ready to use</text>
  <!-- NO -->
  <line x1="230" y1="738" x2="230" y2="758" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="225,756 230,764 235,756" fill="#ef4444"/>
  <text x="244" y="753" fill="#ef4444" font-size="10" font-weight="700">NO</text>

  <!-- ═══════════════════════════════════
       END — No provider
  ═══════════════════════════════════ -->
  <rect x="60" y="764" width="340" height="46" rx="10" fill="#450a0a" stroke="#ef4444" stroke-width="2"/>
  <text x="230" y="783" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">No provider found</text>
  <text x="230" y="800" text-anchor="middle" fill="#f87171" font-size="10">Run: openclaw onboard  to configure one</text>

</svg>
