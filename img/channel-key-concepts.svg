<svg xmlns="http://www.w3.org/2000/svg" width="820" height="490" viewBox="0 0 820 490" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="820" height="490" rx="16" fill="#0f1117"/>

  <!-- Title -->
  <text x="410" y="30" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">Key Concepts at a Glance</text>
  <text x="410" y="48" text-anchor="middle" fill="#475569" font-size="11">Five things to understand — you configure these once per channel account</text>

  <!-- ══════════════════════════════════════
       ROW 1 — Allowlist + Accounts
  ══════════════════════════════════════ -->

  <!-- Card 1: Allowlist (x=20, y=66, w=382, h=172) -->
  <rect x="20" y="66" width="382" height="172" rx="10" fill="#1a0808" stroke="#ef4444" stroke-width="2"/>
  <rect x="20" y="54" width="180" height="24" rx="6" fill="#7f1d1d"/>
  <text x="110" y="71" text-anchor="middle" fill="#fecaca" font-size="11" font-weight="700">🔒  Allowlist</text>

  <!-- divider -->
  <line x1="200" y1="82" x2="200" y2="228" stroke="#3f0d0d" stroke-width="1"/>

  <!-- column headers -->
  <text x="110" y="96" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="700">✓  Allowed — reaches agent</text>
  <text x="305" y="96" text-anchor="middle" fill="#f87171" font-size="10" font-weight="700">✗  Blocked — silently dropped</text>

  <!-- allowed users -->
  <rect x="34" y="104" width="152" height="20" rx="5" fill="#052e16"/>
  <text x="110" y="119" text-anchor="middle" fill="#4ade80" font-size="10">@myusername</text>
  <rect x="34" y="130" width="152" height="20" rx="5" fill="#052e16"/>
  <text x="110" y="145" text-anchor="middle" fill="#4ade80" font-size="10">@alice</text>
  <rect x="34" y="156" width="152" height="20" rx="5" fill="#052e16"/>
  <text x="110" y="171" text-anchor="middle" fill="#4ade80" font-size="10">* (everyone allowed)</text>

  <!-- blocked users -->
  <rect x="212" y="104" width="176" height="20" rx="5" fill="#450a0a"/>
  <text x="300" y="119" text-anchor="middle" fill="#f87171" font-size="10">@unknown_user</text>
  <rect x="212" y="130" width="176" height="20" rx="5" fill="#450a0a"/>
  <text x="300" y="145" text-anchor="middle" fill="#f87171" font-size="10">+15551234567</text>
  <rect x="212" y="156" width="176" height="20" rx="5" fill="#3f0d0d"/>
  <text x="300" y="171" text-anchor="middle" fill="#64748b" font-size="10">anonymous sender</text>

  <text x="34" y="218" fill="#475569" font-size="10" font-style="italic">Set via dmAllowlist in config — or the wizard asks you during setup</text>

  <!-- Card 2: Accounts (x=418, y=66, w=382, h=172) -->
  <rect x="418" y="66" width="382" height="172" rx="10" fill="#1e1b3a" stroke="#6366f1" stroke-width="2"/>
  <rect x="418" y="54" width="220" height="24" rx="6" fill="#4338ca"/>
  <text x="528" y="71" text-anchor="middle" fill="#e0e7ff" font-size="11" font-weight="700">👤  Accounts</text>
  <text x="680" y="71" fill="#334155" font-size="10" font-style="italic">one channel, many profiles</text>

  <!-- Telegram channel box -->
  <rect x="529" y="82" width="140" height="24" rx="6" fill="#1d4ed8"/>
  <text x="599" y="99" text-anchor="middle" fill="#bfdbfe" font-size="11" font-weight="700">💬 Telegram</text>

  <!-- branch lines -->
  <line x1="565" y1="106" x2="492" y2="130" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="633" y1="106" x2="706" y2="130" stroke="#6366f1" stroke-width="1.5"/>

  <!-- account 1 -->
  <rect x="432" y="130" width="120" height="22" rx="5" fill="#2d1f4e"/>
  <text x="492" y="145" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600">personal</text>
  <line x1="492" y1="152" x2="492" y2="168" stroke="#6366f1" stroke-width="1.5"/>
  <rect x="444" y="168" width="96" height="18" rx="4" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <text x="492" y="181" text-anchor="middle" fill="#86efac" font-size="10">⚙ personal agent</text>

  <!-- account 2 -->
  <rect x="646" y="130" width="120" height="22" rx="5" fill="#2d1f4e"/>
  <text x="706" y="145" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600">work-bot</text>
  <line x1="706" y1="152" x2="706" y2="168" stroke="#6366f1" stroke-width="1.5"/>
  <rect x="658" y="168" width="96" height="18" rx="4" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <text x="706" y="181" text-anchor="middle" fill="#86efac" font-size="10">⚙ work agent</text>

  <text x="432" y="218" fill="#475569" font-size="10" font-style="italic">Each account has its own allowlist and routes to a different agent</text>

  <!-- ══════════════════════════════════════
       ROW 2 — Auth Methods + Threading + Actions
  ══════════════════════════════════════ -->

  <!-- Card 3: Auth Methods (x=20, y=254, w=249, h=172) -->
  <rect x="20" y="254" width="249" height="172" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <rect x="20" y="242" width="196" height="24" rx="6" fill="#1d4ed8"/>
  <text x="118" y="259" text-anchor="middle" fill="#bfdbfe" font-size="11" font-weight="700">🔑  Auth Methods</text>

  <rect x="34" y="270" width="221" height="22" rx="5" fill="#0f172a"/>
  <text x="48" y="285" fill="#93c5fd" font-size="10" font-weight="600">API Token</text>
  <text x="134" y="285" fill="#475569" font-size="10">Telegram · Discord</text>

  <rect x="34" y="298" width="221" height="22" rx="5" fill="#0f172a"/>
  <text x="48" y="313" fill="#93c5fd" font-size="10" font-weight="600">Phone Pairing</text>
  <text x="148" y="313" fill="#475569" font-size="10">WhatsApp · Signal</text>

  <rect x="34" y="326" width="221" height="22" rx="5" fill="#0f172a"/>
  <text x="48" y="341" fill="#93c5fd" font-size="10" font-weight="600">OAuth</text>
  <text x="100" y="341" fill="#475569" font-size="10">Slack · Google Chat</text>

  <rect x="34" y="354" width="221" height="22" rx="5" fill="#0f172a"/>
  <text x="48" y="369" fill="#93c5fd" font-size="10" font-weight="600">No Auth</text>
  <text x="106" y="369" fill="#475569" font-size="10">Ollama (local model)</text>

  <text x="34" y="408" fill="#475569" font-size="10" font-style="italic">Wizard handles the auth flow for each platform</text>

  <!-- Card 4: Threading (x=285, y=254, w=249, h=172) -->
  <rect x="285" y="254" width="249" height="172" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="285" y="242" width="196" height="24" rx="6" fill="#6d28d9"/>
  <text x="383" y="259" text-anchor="middle" fill="#ede9fe" font-size="11" font-weight="700">💬  Threading</text>

  <!-- Off -->
  <text x="299" y="287" fill="#c4b5fd" font-size="10" font-weight="700">Off</text>
  <rect x="325" y="274" width="60" height="18" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="355" y="287" text-anchor="middle" fill="#64748b" font-size="10">Msg 1</text>
  <line x1="387" y1="283" x2="397" y2="283" stroke="#334155" stroke-width="1" stroke-dasharray="2,2"/>
  <rect x="397" y="274" width="60" height="18" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="427" y="287" text-anchor="middle" fill="#64748b" font-size="10">Reply</text>

  <!-- First -->
  <text x="299" y="320" fill="#c4b5fd" font-size="10" font-weight="700">First</text>
  <rect x="325" y="306" width="60" height="18" rx="4" fill="#2d1f4e" stroke="#8b5cf6" stroke-width="1"/>
  <text x="355" y="319" text-anchor="middle" fill="#a5b4fc" font-size="10">Msg 1</text>
  <line x1="355" y1="324" x2="355" y2="337" stroke="#8b5cf6" stroke-width="1"/>
  <rect x="325" y="337" width="60" height="18" rx="4" fill="#2d1f4e" stroke="#8b5cf6" stroke-width="1"/>
  <text x="355" y="350" text-anchor="middle" fill="#a5b4fc" font-size="10">↩ Reply</text>

  <!-- All -->
  <text x="299" y="378" fill="#c4b5fd" font-size="10" font-weight="700">All</text>
  <rect x="325" y="364" width="60" height="18" rx="4" fill="#2d1f4e" stroke="#8b5cf6" stroke-width="1"/>
  <text x="355" y="377" text-anchor="middle" fill="#a5b4fc" font-size="10">Msg N</text>
  <line x1="387" y1="373" x2="397" y2="373" stroke="#8b5cf6" stroke-width="1"/>
  <rect x="397" y="364" width="60" height="18" rx="4" fill="#2d1f4e" stroke="#8b5cf6" stroke-width="1"/>
  <text x="427" y="377" text-anchor="middle" fill="#a5b4fc" font-size="10">↩ Reply</text>

  <text x="299" y="408" fill="#475569" font-size="10" font-style="italic">Slack &amp; Discord support native threads</text>

  <!-- Card 5: Actions (x=550, y=254, w=250, h=172) -->
  <rect x="550" y="254" width="250" height="172" rx="10" fill="#071a0e" stroke="#10b981" stroke-width="2"/>
  <rect x="550" y="242" width="196" height="24" rx="6" fill="#065f46"/>
  <text x="648" y="259" text-anchor="middle" fill="#d1fae5" font-size="11" font-weight="700">⚡  Actions</text>
  <text x="758" y="259" fill="#334155" font-size="10" font-style="italic">beyond text</text>

  <text x="564" y="285" fill="#6ee7b7" font-size="10" font-weight="700">Discord</text>
  <text x="621" y="285" fill="#475569" font-size="10">add/remove roles, threads</text>
  <line x1="564" y1="292" x2="788" y2="292" stroke="#0a2117" stroke-width="1"/>

  <text x="564" y="313" fill="#6ee7b7" font-size="10" font-weight="700">Slack</text>
  <text x="607" y="313" fill="#475569" font-size="10">set status, react, create channels</text>
  <line x1="564" y1="320" x2="788" y2="320" stroke="#0a2117" stroke-width="1"/>

  <text x="564" y="341" fill="#6ee7b7" font-size="10" font-weight="700">Telegram</text>
  <text x="627" y="341" fill="#475569" font-size="10">pin messages, manage admins</text>
  <line x1="564" y1="348" x2="788" y2="348" stroke="#0a2117" stroke-width="1"/>

  <text x="564" y="369" fill="#6ee7b7" font-size="10" font-weight="700">All</text>
  <text x="590" y="369" fill="#475569" font-size="10">send messages, read history</text>

  <text x="564" y="408" fill="#475569" font-size="10" font-style="italic">Exposed as agent tools — no extra config needed</text>

</svg>
