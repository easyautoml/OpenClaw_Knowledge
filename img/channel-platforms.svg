  <rect x="414" y="232" width="386" height="152" rx="10" fill="#071a0e" stroke="#10b981" stroke-width="2"/>
  <rect x="414" y="220" width="200" height="24" rx="6" fill="#065f46"/>
  <text x="514" y="237" text-anchor="middle" fill="#d1fae5" font-size="11" font-weight="700">🔧  Developer &amp; Other</text>

  <text x="430" y="264" fill="#6ee7b7" font-size="11">• Matrix</text>
  <text x="430" y="282" fill="#6ee7b7" font-size="11">• IRC</text>
  <text x="430" y="300" fill="#6ee7b7" font-size="11">• Nostr</text>
  <text x="430" y="318" fill="#6ee7b7" font-size="11">• Twitch</text>
  <text x="430" y="336" fill="#6ee7b7" font-size="11">• WebChat / Voice Call</text>

  <text x="594" y="264" fill="#475569" font-size="10">Open, federated protocol</text>
  <text x="594" y="282" fill="#475569" font-size="10">Classic chat networks</text>
  <text x="594" y="300" fill="#475569" font-size="10">Decentralized social</text>
  <text x="594" y="318" fill="#475569" font-size="10">Live stream chat</text>
  <text x="594" y="336" fill="#475569" font-size="10">Browser widget / audio</text>

  <text x="607" y="372" text-anchor="middle" fill="#334155" font-size="10" font-style="italic">Open / niche platforms</text>

  <!-- Footer -->
  <rect x="120" y="397" width="580" height="16" rx="4" fill="#1e293b"/>
  <text x="410" y="409" text-anchor="middle" fill="#475569" font-size="10">New platforms can be added as plugins — discover available ones with: openclaw channels list</text>

