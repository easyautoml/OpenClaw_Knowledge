  <text x="36" y="282" fill="#fcd34d" font-size="11">• Zalo / Zalo Personal</text>
  <text x="36" y="300" fill="#fcd34d" font-size="11">• Feishu (Lark)</text>
  <text x="36" y="318" fill="#fcd34d" font-size="11">• Google Chat</text>
  <text x="36" y="336" fill="#fcd34d" font-size="11">• Synology Chat</text>

  <text x="226" y="264" fill="#475569" font-size="10">Japan / Taiwan / Southeast Asia</text>
  <text x="226" y="282" fill="#475569" font-size="10">Vietnam</text>
  <text x="226" y="300" fill="#475569" font-size="10">China / Asia (ByteDance)</text>
