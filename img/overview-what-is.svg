<svg viewBox="0 0 820 210" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">

  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4b5563"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="210" fill="#080b16" rx="14"/>

  <!-- ── Box 1: You ── -->
  <rect x="20" y="55" width="138" height="92" rx="10" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="20" y="55" width="138" height="5" rx="3" fill="#3b82f6" opacity="0.5"/>
  <!-- person head -->
  <circle cx="89" cy="84" r="13" fill="none" stroke="#60a5fa" stroke-width="2"/>
  <!-- person body -->
  <path d="M 64 114 Q 89 98 114 114" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <text x="89" y="136" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">You</text>

  <!-- Arrow 1 -->
  <line x1="162" y1="101" x2="190" y2="101" stroke="#4b5563" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="176" y="94" text-anchor="middle" fill="#6b7280" font-size="9">sends</text>

  <!-- ── Box 2: Messaging App ── -->
  <rect x="195" y="55" width="152" height="92" rx="10" fill="#0f172a" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="195" y="55" width="152" height="5" rx="3" fill="#7c3aed" opacity="0.5"/>
  <!-- phone outline -->
  <rect x="251" y="68" width="38" height="52" rx="5" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
  <!-- phone screen lines -->
  <rect x="257" y="74" width="26" height="3" rx="1" fill="#7c3aed"/>
  <rect x="257" y="80" width="18" height="3" rx="1" fill="#7c3aed" opacity="0.6"/>
  <rect x="257" y="86" width="22" height="3" rx="1" fill="#7c3aed" opacity="0.6"/>
  <rect x="257" y="92" width="14" height="3" rx="1" fill="#7c3aed" opacity="0.4"/>
  <!-- phone home button -->
  <circle cx="270" cy="113" r="3" fill="#a78bfa"/>
  <text x="271" y="132" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">Messaging App</text>
  <text x="271" y="144" text-anchor="middle" fill="#6b7280" font-size="9">Telegram · Slack · +40</text>

  <!-- Arrow 2 -->
  <line x1="351" y1="101" x2="379" y2="101" stroke="#4b5563" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ── Box 3: OpenClaw (highlighted, taller) ── -->
  <rect x="384" y="42" width="178" height="118" rx="10" fill="#0f172a" stroke="#f97316" stroke-width="2"/>
  <rect x="384" y="42" width="178" height="5" rx="3" fill="#f97316" opacity="0.7"/>
  <!-- hexagon icon -->
  <polygon points="473,64 489,73 489,91 473,100 457,91 457,73" fill="none" stroke="#f97316" stroke-width="2"/>
  <polygon points="473,70 483,76 483,88 473,94 463,88 463,76" fill="#f97316" opacity="0.15"/>
  <text x="473" y="120" text-anchor="middle" fill="#fb923c" font-size="15" font-weight="700">OpenClaw</text>
  <text x="473" y="136" text-anchor="middle" fill="#9ca3af" font-size="10">routes · runs agent</text>
  <text x="473" y="150" text-anchor="middle" fill="#9ca3af" font-size="10">delivers reply</text>

  <!-- Arrow 3 -->
  <line x1="566" y1="101" x2="594" y2="101" stroke="#4b5563" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ── Box 4: AI Model ── -->
  <rect x="599" y="55" width="188" height="92" rx="10" fill="#0f172a" stroke="#10b981" stroke-width="1.5"/>
  <rect x="599" y="55" width="188" height="5" rx="3" fill="#10b981" opacity="0.5"/>
  <!-- crosshair circle icon -->
  <circle cx="693" cy="88" r="18" fill="none" stroke="#34d399" stroke-width="1.5"/>
  <circle cx="693" cy="88" r="7" fill="none" stroke="#34d399" stroke-width="1.5"/>
  <line x1="675" y1="88" x2="686" y2="88" stroke="#34d399" stroke-width="1.5"/>
  <line x1="700" y1="88" x2="711" y2="88" stroke="#34d399" stroke-width="1.5"/>
  <line x1="693" y1="70" x2="693" y2="81" stroke="#34d399" stroke-width="1.5"/>
  <line x1="693" y1="95" x2="693" y2="106" stroke="#34d399" stroke-width="1.5"/>
  <text x="693" y="123" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="600">AI Model</text>
  <text x="693" y="136" text-anchor="middle" fill="#6b7280" font-size="9">Claude · GPT-4o · Gemini</text>
  <text x="693" y="146" text-anchor="middle" fill="#6b7280" font-size="9">Ollama · +30 providers</text>

  <!-- ── Return dashed arrow (below) ── -->
  <path d="M 779 152 L 779 185 L 50 185 L 50 152"
        fill="none" stroke="#374151" stroke-width="1.5" stroke-dasharray="6,3"
        marker-end="url(#ah)"/>
  <text x="415" y="198" text-anchor="middle" fill="#4b5563" font-size="10">reply delivered back to you in the same app</text>

</svg>
