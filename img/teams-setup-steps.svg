<svg xmlns="http://www.w3.org/2000/svg" width="820" height="252" viewBox="0 0 820 252" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="820" height="252" rx="16" fill="#0f1117"/>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">Setting Up Microsoft Teams — 5 Steps on the Azure Side</text>
  <text x="410" y="46" text-anchor="middle" fill="#475569" font-size="11">All 5 steps are required — Teams uses a single connection method via Azure Bot Service</text>

  <!-- ══ Step 1: Register App (x=20, blue) ══ -->
  <rect x="20" y="66" width="136" height="132" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <rect x="20" y="54" width="136" height="24" rx="6" fill="#1d4ed8"/>
  <circle cx="38" cy="66" r="11" fill="#3b82f6"/>
  <text x="38" y="71" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>
  <text x="88" y="71" text-anchor="middle" fill="#bfdbfe" font-size="10" font-weight="700">Register App</text>

  <text x="88" y="106" text-anchor="middle" fill="#93c5fd" font-size="20">📋</text>
  <text x="88" y="132" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">Azure App Registration</text>
  <text x="88" y="150" text-anchor="middle" fill="#64748b" font-size="10">portal.azure.com</text>
  <text x="88" y="166" text-anchor="middle" fill="#64748b" font-size="10">Azure Active Directory</text>
  <text x="88" y="185" text-anchor="middle" fill="#475569" font-size="10" font-style="italic">Get App ID + Tenant ID</text>

  <!-- Arrow 1→2 -->
  <line x1="158" y1="132" x2="177" y2="132" stroke="#475569" stroke-width="2"/>
  <polygon points="175,126 185,132 175,138" fill="#475569"/>

  <!-- ══ Step 2: Client Secret (x=180, amber) ══ -->
  <rect x="180" y="66" width="136" height="132" rx="10" fill="#1c1408" stroke="#f59e0b" stroke-width="2"/>
  <rect x="180" y="54" width="136" height="24" rx="6" fill="#b45309"/>
  <circle cx="198" cy="66" r="11" fill="#f59e0b"/>
  <text x="198" y="71" text-anchor="middle" fill="#0f1117" font-size="11" font-weight="700">2</text>
  <text x="248" y="71" text-anchor="middle" fill="#fef3c7" font-size="10" font-weight="700">Client Secret</text>

  <text x="248" y="106" text-anchor="middle" fill="#fcd34d" font-size="20">🔐</text>
  <text x="248" y="132" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">Create App Password</text>
  <text x="248" y="150" text-anchor="middle" fill="#64748b" font-size="10">Certificates &amp; secrets</text>
  <text x="248" y="166" text-anchor="middle" fill="#64748b" font-size="10">New client secret</text>
  <text x="248" y="185" text-anchor="middle" fill="#475569" font-size="10" font-style="italic">Copy value once shown</text>

  <!-- Arrow 2→3 -->
  <line x1="318" y1="132" x2="337" y2="132" stroke="#475569" stroke-width="2"/>
  <polygon points="335,126 345,132 335,138" fill="#475569"/>

  <!-- ══ Step 3: Azure Bot (x=340, purple) ══ -->
  <rect x="340" y="66" width="136" height="132" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="340" y="54" width="136" height="24" rx="6" fill="#6d28d9"/>
  <circle cx="358" cy="66" r="11" fill="#8b5cf6"/>
  <text x="358" y="71" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>
  <text x="408" y="71" text-anchor="middle" fill="#ede9fe" font-size="10" font-weight="700">Create Azure Bot</text>

  <text x="408" y="106" text-anchor="middle" fill="#c4b5fd" font-size="20">🤖</text>
  <text x="408" y="132" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">Azure Bot resource</text>
  <text x="408" y="150" text-anchor="middle" fill="#64748b" font-size="10">Create a resource</text>
  <text x="408" y="166" text-anchor="middle" fill="#64748b" font-size="10">Link your App ID</text>
  <text x="408" y="185" text-anchor="middle" fill="#475569" font-size="10" font-style="italic">Choose tenant type</text>

  <!-- Arrow 3→4 -->
  <line x1="478" y1="132" x2="497" y2="132" stroke="#475569" stroke-width="2"/>
  <polygon points="495,126 505,132 495,138" fill="#475569"/>

  <!-- ══ Step 4: Set Endpoint (x=500, indigo) ══ -->
  <rect x="500" y="66" width="136" height="132" rx="10" fill="#1e1b3a" stroke="#6366f1" stroke-width="2"/>
  <rect x="500" y="54" width="136" height="24" rx="6" fill="#4338ca"/>
  <circle cx="518" cy="66" r="11" fill="#6366f1"/>
  <text x="518" y="71" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text>
  <text x="568" y="71" text-anchor="middle" fill="#e0e7ff" font-size="10" font-weight="700">Set Endpoint</text>

  <text x="568" y="106" text-anchor="middle" fill="#a5b4fc" font-size="20">🔗</text>
  <text x="568" y="132" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600">Messaging Endpoint</text>
  <text x="568" y="150" text-anchor="middle" fill="#64748b" font-size="10">Configuration tab</text>
  <text x="568" y="166" text-anchor="middle" fill="#64748b" font-size="10">https://your-url</text>
  <text x="568" y="182" text-anchor="middle" fill="#64748b" font-size="10">/api/messages</text>

  <!-- Arrow 4→5 -->
  <line x1="638" y1="132" x2="657" y2="132" stroke="#475569" stroke-width="2"/>
  <polygon points="655,126 665,132 655,138" fill="#475569"/>

  <!-- ══ Step 5: Enable Teams + Copy (x=660, green) ══ -->
  <rect x="660" y="66" width="136" height="132" rx="10" fill="#071a0e" stroke="#10b981" stroke-width="2.5"/>
  <rect x="660" y="54" width="136" height="24" rx="6" fill="#065f46"/>
  <circle cx="678" cy="66" r="11" fill="#10b981"/>
  <text x="678" y="71" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">5</text>
  <text x="728" y="71" text-anchor="middle" fill="#d1fae5" font-size="10" font-weight="700">Enable Teams</text>

  <text x="728" y="106" text-anchor="middle" fill="#6ee7b7" font-size="20">✅</text>
  <text x="728" y="132" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">Add Teams channel</text>
  <text x="728" y="150" text-anchor="middle" fill="#64748b" font-size="10">Channels tab → Teams</text>
  <text x="728" y="166" text-anchor="middle" fill="#64748b" font-size="10">Save App ID, Password</text>
  <text x="728" y="182" text-anchor="middle" fill="#64748b" font-size="10">and Tenant ID</text>

  <!-- Footer -->
  <rect x="100" y="212" width="620" height="16" rx="4" fill="#1e293b"/>
  <text x="410" y="224" text-anchor="middle" fill="#475569" font-size="10">After Step 5 — go to Section 3 to connect these credentials to OpenClaw</text>

</svg>
