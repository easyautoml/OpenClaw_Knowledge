<svg xmlns="http://www.w3.org/2000/svg" width="820" height="280" viewBox="0 0 820 280" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="820" height="280" rx="16" fill="#0f1117"/>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">How OpenClaw Connects to Slack</text>
  <text x="410" y="46" text-anchor="middle" fill="#475569" font-size="11">Socket Mode keeps a persistent WebSocket open — no public URL or port forwarding needed</text>

  <!-- ══ Slack Workspace box ══ -->
  <rect x="20" y="60" width="212" height="190" rx="12" fill="#1a1208" stroke="#f59e0b" stroke-width="2"/>
  <rect x="20" y="48" width="212" height="24" rx="6" fill="#b45309"/>
  <text x="126" y="65" text-anchor="middle" fill="#fef3c7" font-size="11" font-weight="700">💬  Slack Workspace</text>

  <text x="126" y="106" text-anchor="middle" fill="#fcd34d" font-size="22">🏢</text>
  <text x="126" y="132" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600">Your Slack workspace</text>
  <text x="38" y="158" fill="#64748b" font-size="10">• Public channels  (#general)</text>
  <text x="38" y="176" fill="#64748b" font-size="10">• Private channels</text>
  <text x="38" y="194" fill="#64748b" font-size="10">• Direct messages (DMs)</text>
  <text x="38" y="238" fill="#475569" font-size="10" font-style="italic">Users send messages here</text>

  <!-- ══ Middle arrows ══ -->

  <!-- Arrow 1: Messages Slack → OpenClaw (Socket Mode) -->
  <line x1="234" y1="126" x2="556" y2="126" stroke="#22c55e" stroke-width="2"/>
  <polygon points="554,120 564,126 554,132" fill="#22c55e"/>
  <rect x="288" y="106" width="236" height="18" rx="4" fill="#0a2117"/>
  <text x="406" y="119" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">Messages → Socket Mode WebSocket (xapp-)</text>

  <!-- Arrow 2: Replies OpenClaw → Slack (Web API) -->
  <line x1="556" y1="166" x2="234" y2="166" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="236,160 226,166 236,172" fill="#3b82f6"/>
  <rect x="288" y="170" width="236" height="18" rx="4" fill="#0f1b2d"/>
  <text x="406" y="183" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">Replies ← Slack Web API (xoxb-)</text>

  <!-- ══ OpenClaw box ══ -->
  <rect x="558" y="60" width="242" height="190" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <rect x="558" y="48" width="242" height="24" rx="6" fill="#4338ca"/>
  <text x="679" y="65" text-anchor="middle" fill="#e0e7ff" font-size="11" font-weight="700">⚙  OpenClaw (your machine)</text>

  <rect x="574" y="76" width="210" height="22" rx="5" fill="#1e1b3a" stroke="#6366f1" stroke-width="1"/>
  <text x="679" y="91" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600">Gateway — receives events</text>

  <line x1="679" y1="98" x2="679" y2="114" stroke="#6366f1" stroke-width="1.5"/>

  <rect x="574" y="114" width="210" height="22" rx="5" fill="#1a0d26" stroke="#8b5cf6" stroke-width="1"/>
  <text x="679" y="129" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">Agent — decides what to do</text>

  <line x1="679" y1="136" x2="679" y2="152" stroke="#8b5cf6" stroke-width="1.5"/>

  <rect x="574" y="152" width="210" height="22" rx="5" fill="#1a0d26" stroke="#a855f7" stroke-width="1"/>
  <text x="679" y="167" text-anchor="middle" fill="#d8b4fe" font-size="10" font-weight="600">LLM — generates the reply</text>

  <text x="574" y="202" fill="#475569" font-size="10">App Token (xapp-) → Socket Mode</text>
  <text x="574" y="218" fill="#475569" font-size="10">Bot Token (xoxb-) → send &amp; read</text>
  <text x="574" y="238" fill="#334155" font-size="10" font-style="italic">Runs locally — no open port needed</text>

  <!-- Footer -->
  <rect x="80" y="260" width="660" height="14" rx="4" fill="#1e293b"/>
  <text x="410" y="271" text-anchor="middle" fill="#475569" font-size="10">OpenClaw initiates the WebSocket outward to Slack's servers — your machine never needs to be publicly reachable</text>

</svg>
