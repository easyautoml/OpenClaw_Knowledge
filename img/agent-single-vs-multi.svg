<svg xmlns="http://www.w3.org/2000/svg" width="900" height="580" viewBox="0 0 900 580" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="580" rx="16" fill="#0f1117"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">One Agent, Multiple Independent, or Collaborative Team?</text>
  <text x="450" y="52" text-anchor="middle" fill="#475569" font-size="11">Choose based on your task — agents can work alone or work together</text>

  <!-- ══════════════════════════════════════
       PANEL 1 — One Agent
  ══════════════════════════════════════ -->
  <rect x="20" y="68" width="262" height="420" rx="12" fill="#0d1526" stroke="#3b82f6" stroke-width="2"/>
  <!-- header badge -->
  <rect x="20" y="56" width="262" height="24" rx="6" fill="#1d4ed8"/>
  <text x="151" y="73" text-anchor="middle" fill="#bfdbfe" font-size="12" font-weight="700">One Agent</text>

  <!-- YOU -->
  <rect x="96" y="88" width="110" height="44" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="151" y="108" text-anchor="middle" fill="#93c5fd" font-size="16">👤</text>
  <text x="151" y="124" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">You</text>

  <!-- arrow down -->
  <line x1="151" y1="132" x2="151" y2="152" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="146,150 151,158 156,150" fill="#3b82f6"/>

  <!-- AGENT -->
  <rect x="76" y="158" width="150" height="54" rx="10" fill="#1e1b3a" stroke="#6366f1" stroke-width="2"/>
  <text x="151" y="181" text-anchor="middle" fill="#a5b4fc" font-size="16">⚙</text>
  <text x="151" y="200" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="700">Agent</text>

  <!-- arrow down -->
  <line x1="151" y1="212" x2="151" y2="232" stroke="#6366f1" stroke-width="1.5"/>
  <polygon points="146,230 151,238 156,230" fill="#6366f1"/>

  <!-- Model -->
  <rect x="86" y="238" width="130" height="40" rx="8" fill="#0a1f14" stroke="#22c55e" stroke-width="1.5"/>
  <text x="151" y="263" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">🧠 Model</text>

  <!-- divider -->
  <line x1="36" y1="298" x2="266" y2="298" stroke="#1e293b" stroke-width="1"/>

  <!-- Use when -->
  <text x="151" y="318" text-anchor="middle" fill="#64748b" font-size="10" font-weight="700">USE WHEN</text>
  <text x="151" y="336" text-anchor="middle" fill="#94a3b8" font-size="10">• One purpose, one task type</text>
  <text x="151" y="352" text-anchor="middle" fill="#94a3b8" font-size="10">• Personal daily assistant</text>
  <text x="151" y="368" text-anchor="middle" fill="#94a3b8" font-size="10">• Just getting started</text>
  <text x="151" y="384" text-anchor="middle" fill="#94a3b8" font-size="10">• Simple requests</text>

  <!-- avoid when -->
  <text x="151" y="412" text-anchor="middle" fill="#475569" font-size="10" font-weight="700">NOT IDEAL WHEN</text>
  <text x="151" y="428" text-anchor="middle" fill="#475569" font-size="10">• Tasks need different tools</text>
  <text x="151" y="444" text-anchor="middle" fill="#475569" font-size="10">• Work and personal mixed</text>
  <text x="151" y="460" text-anchor="middle" fill="#475569" font-size="10">• Need different models</text>


  <!-- ══════════════════════════════════════
       PANEL 2 — Multiple Independent
  ══════════════════════════════════════ -->
  <rect x="318" y="68" width="262" height="420" rx="12" fill="#1a0d26" stroke="#a855f7" stroke-width="2"/>
  <!-- header badge -->
  <rect x="318" y="56" width="262" height="24" rx="6" fill="#7e22ce"/>
  <text x="449" y="73" text-anchor="middle" fill="#e9d5ff" font-size="12" font-weight="700">Multiple — Independent</text>

  <!-- YOU -->
  <rect x="394" y="88" width="110" height="44" rx="10" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="449" y="108" text-anchor="middle" fill="#d8b4fe" font-size="16">👤</text>
  <text x="449" y="124" text-anchor="middle" fill="#d8b4fe" font-size="11" font-weight="700">You</text>

  <!-- arrow to agent A -->
  <line x1="410" y1="132" x2="370" y2="160" stroke="#a855f7" stroke-width="1.5"/>
  <polygon points="367,156 363,165 373,162" fill="#a855f7"/>
  <!-- arrow to agent B -->
  <line x1="488" y1="132" x2="526" y2="160" stroke="#a855f7" stroke-width="1.5"/>
  <polygon points="531,156 535,165 525,162" fill="#a855f7"/>

  <!-- Agent A -->
  <rect x="324" y="162" width="120" height="54" rx="10" fill="#1e1b3a" stroke="#6366f1" stroke-width="1.5"/>
  <text x="384" y="185" text-anchor="middle" fill="#a5b4fc" font-size="14">⚙</text>
  <text x="384" y="202" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="700">Coder Agent</text>

  <!-- Agent B -->
  <rect x="466" y="162" width="106" height="54" rx="10" fill="#1e1b3a" stroke="#6366f1" stroke-width="1.5"/>
  <text x="519" y="185" text-anchor="middle" fill="#a5b4fc" font-size="14">⚙</text>
  <text x="519" y="202" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="700">Research Agent</text>

  <!-- No link between agents -->
  <line x1="444" y1="189" x2="466" y2="189" stroke="#450a0a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="455" y="183" text-anchor="middle" fill="#ef4444" font-size="9">✕</text>

  <!-- model A -->
  <rect x="334" y="228" width="100" height="32" rx="6" fill="#0a1f14" stroke="#22c55e" stroke-width="1"/>
  <text x="384" y="248" text-anchor="middle" fill="#86efac" font-size="10">🧠 Claude</text>

  <!-- model B -->
  <rect x="471" y="228" width="100" height="32" rx="6" fill="#14101e" stroke="#6366f1" stroke-width="1"/>
  <text x="521" y="248" text-anchor="middle" fill="#a5b4fc" font-size="10">🧠 GPT-4o</text>

  <!-- divider -->
  <line x1="334" y1="278" x2="564" y2="278" stroke="#1e293b" stroke-width="1"/>

  <!-- Use when -->
  <text x="449" y="298" text-anchor="middle" fill="#64748b" font-size="10" font-weight="700">USE WHEN</text>
  <text x="449" y="316" text-anchor="middle" fill="#94a3b8" font-size="10">• Different tools per purpose</text>
  <text x="449" y="332" text-anchor="middle" fill="#94a3b8" font-size="10">• Different models per task</text>
  <text x="449" y="348" text-anchor="middle" fill="#94a3b8" font-size="10">• Separate work / personal</text>
  <text x="449" y="364" text-anchor="middle" fill="#94a3b8" font-size="10">• Isolated workspaces</text>

  <!-- behavior note -->
  <rect x="330" y="380" width="234" height="48" rx="6" fill="#1c0a2e" stroke="#a855f7" stroke-width="1"/>
  <text x="447" y="398" text-anchor="middle" fill="#d8b4fe" font-size="10" font-weight="700">Agents do NOT share context</text>
  <text x="447" y="414" text-anchor="middle" fill="#64748b" font-size="10">You switch manually — each agent</text>
  <text x="447" y="428" text-anchor="middle" fill="#64748b" font-size="10">works alone in its own workspace</text>


  <!-- ══════════════════════════════════════
       PANEL 3 — Collaborative Team
  ══════════════════════════════════════ -->
  <rect x="616" y="68" width="264" height="420" rx="12" fill="#0a1f14" stroke="#22c55e" stroke-width="2"/>
  <!-- header badge -->
  <rect x="616" y="56" width="264" height="24" rx="6" fill="#14532d"/>
  <text x="748" y="73" text-anchor="middle" fill="#bbf7d0" font-size="12" font-weight="700">Multiple — Collaborative</text>

  <!-- YOU -->
  <rect x="693" y="88" width="110" height="44" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="748" y="108" text-anchor="middle" fill="#86efac" font-size="16">👤</text>
  <text x="748" y="124" text-anchor="middle" fill="#86efac" font-size="11" font-weight="700">You</text>

  <!-- arrow to lead agent -->
  <line x1="748" y1="132" x2="748" y2="152" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="743,150 748,158 753,150" fill="#22c55e"/>

  <!-- LEAD AGENT -->
  <rect x="673" y="158" width="150" height="54" rx="10" fill="#1e1b3a" stroke="#22c55e" stroke-width="2"/>
  <text x="748" y="181" text-anchor="middle" fill="#86efac" font-size="14">⚙</text>
  <text x="748" y="200" text-anchor="middle" fill="#86efac" font-size="10" font-weight="700">Lead Agent</text>

  <!-- spawn arrows -->
  <line x1="700" y1="212" x2="670" y2="240" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="667,236 664,246 674,242" fill="#22c55e"/>
  <line x1="796" y1="212" x2="826" y2="240" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="829,236 832,246 822,242" fill="#22c55e"/>

  <!-- spawn label -->
  <text x="748" y="230" text-anchor="middle" fill="#22c55e" font-size="9">spawns</text>

  <!-- Sub-agent 1 -->
  <rect x="624" y="244" width="96" height="42" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="672" y="261" text-anchor="middle" fill="#6ee7b7" font-size="13">⚙</text>
  <text x="672" y="277" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="700">Sub-agent A</text>

  <!-- Sub-agent 2 -->
  <rect x="776" y="244" width="96" height="42" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="824" y="261" text-anchor="middle" fill="#6ee7b7" font-size="13">⚙</text>
  <text x="824" y="277" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="700">Sub-agent B</text>

  <!-- results back to lead -->
  <line x1="672" y1="286" x2="706" y2="310" stroke="#10b981" stroke-width="1.5"/>
  <polygon points="709,306 713,316 703,312" fill="#10b981"/>
  <line x1="824" y1="286" x2="790" y2="310" stroke="#10b981" stroke-width="1.5"/>
  <polygon points="787,306 783,316 793,312" fill="#10b981"/>

  <!-- results label -->
  <text x="748" y="308" text-anchor="middle" fill="#10b981" font-size="9">results back</text>

  <!-- combined reply box -->
  <rect x="683" y="316" width="130" height="32" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
  <text x="748" y="337" text-anchor="middle" fill="#bbf7d0" font-size="10" font-weight="700">Combined Reply → You</text>

  <!-- divider -->
  <line x1="630" y1="362" x2="866" y2="362" stroke="#1e293b" stroke-width="1"/>

  <!-- Use when -->
  <text x="748" y="382" text-anchor="middle" fill="#64748b" font-size="10" font-weight="700">USE WHEN</text>
  <text x="748" y="400" text-anchor="middle" fill="#94a3b8" font-size="10">• Large / complex task</text>
  <text x="748" y="416" text-anchor="middle" fill="#94a3b8" font-size="10">• Parts can run in parallel</text>
  <text x="748" y="432" text-anchor="middle" fill="#94a3b8" font-size="10">• One agent orchestrates others</text>
  <text x="748" y="448" text-anchor="middle" fill="#94a3b8" font-size="10">• Research + write + review</text>


  <!-- ══════════════════════════════════════
       BOTTOM DECISION BAR
  ══════════════════════════════════════ -->
  <rect x="20" y="504" width="860" height="48" rx="10" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="450" y="522" text-anchor="middle" fill="#64748b" font-size="11" font-weight="700">Quick Decision Guide</text>
  <text x="151" y="540" text-anchor="middle" fill="#60a5fa" font-size="10">Simple task → One Agent</text>
  <text x="449" y="540" text-anchor="middle" fill="#c084fc" font-size="10">Different purposes → Independent Agents (manual switch)</text>
  <text x="748" y="540" text-anchor="middle" fill="#4ade80" font-size="10">Big task → Collaborative (lead + sub-agents)</text>

</svg>
