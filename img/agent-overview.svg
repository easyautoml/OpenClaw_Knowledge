<svg xmlns="http://www.w3.org/2000/svg" width="780" height="460" viewBox="0 0 780 460" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="780" height="460" rx="16" fill="#0f1117"/>

  <!-- Title -->
  <text x="390" y="34" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">What an Agent Is Made Of</text>
  <text x="390" y="52" text-anchor="middle" fill="#475569" font-size="11">Agent = Model + Identity + Tools + Skills + Workspace + Safety</text>

  <!-- YOU (top left) -->
  <rect x="30" y="180" width="110" height="60" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="85" y="206" text-anchor="middle" fill="#93c5fd" font-size="18">👤</text>
  <text x="85" y="228" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">You</text>

  <!-- Arrow YOU -> AGENT -->
  <line x1="142" y1="210" x2="246" y2="210" stroke="#6366f1" stroke-width="2"/>
  <polygon points="243,204 254,210 243,216" fill="#6366f1"/>

  <!-- AGENT (center) -->
  <rect x="256" y="150" width="170" height="120" rx="14" fill="#1e1b3a" stroke="#6366f1" stroke-width="2.5"/>
  <text x="341" y="190" text-anchor="middle" fill="#a5b4fc" font-size="24">⚙</text>
  <text x="341" y="215" text-anchor="middle" fill="#a5b4fc" font-size="14" font-weight="700">Agent</text>
  <text x="341" y="234" text-anchor="middle" fill="#64748b" font-size="10">the runner layer</text>
  <text x="341" y="250" text-anchor="middle" fill="#64748b" font-size="10">handles your request</text>

  <!-- Arrow AGENT -> MODEL -->
  <line x1="428" y1="210" x2="520" y2="210" stroke="#22c55e" stroke-width="2"/>
  <polygon points="517,204 528,210 517,216" fill="#22c55e"/>

  <!-- MODEL (top right) -->
  <rect x="530" y="180" width="120" height="60" rx="10" fill="#0a1f14" stroke="#22c55e" stroke-width="2"/>
  <text x="590" y="206" text-anchor="middle" fill="#86efac" font-size="18">🧠</text>
  <text x="590" y="228" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">Model (LLM)</text>

  <!-- ── Component boxes around agent ── -->

  <!-- Identity -->
  <rect x="70" y="80" width="130" height="52" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="135" y="101" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="700">Identity</text>
  <text x="135" y="118" text-anchor="middle" fill="#64748b" font-size="10">name · persona · language</text>
  <!-- connector -->
  <line x1="200" y1="132" x2="290" y2="160" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Skills -->
  <rect x="70" y="320" width="130" height="52" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="135" y="341" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="700">Skills</text>
  <text x="135" y="358" text-anchor="middle" fill="#64748b" font-size="10">custom commands / tasks</text>
  <!-- connector -->
  <line x1="200" y1="346" x2="290" y2="260" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Tools -->
  <rect x="310" y="320" width="130" height="52" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="375" y="341" text-anchor="middle" fill="#d8b4fe" font-size="11" font-weight="700">Tools</text>
  <text x="375" y="358" text-anchor="middle" fill="#64748b" font-size="10">web · code · messaging</text>
  <!-- connector -->
  <line x1="375" y1="320" x2="375" y2="272" stroke="#a855f7" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Workspace -->
  <rect x="540" y="320" width="130" height="52" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="605" y="341" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="700">Workspace</text>
  <text x="605" y="358" text-anchor="middle" fill="#64748b" font-size="10">folder for files / context</text>
  <!-- connector -->
  <line x1="560" y1="320" x2="426" y2="264" stroke="#10b981" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Safety (Sandbox) -->
  <rect x="540" y="80" width="130" height="52" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="605" y="101" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">Sandbox (Safety)</text>
  <text x="605" y="118" text-anchor="middle" fill="#64748b" font-size="10">runs code in isolation</text>
  <!-- connector -->
  <line x1="565" y1="132" x2="426" y2="160" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Footer -->
  <text x="390" y="430" text-anchor="middle" fill="#334155" font-size="11">One Agent wraps everything together — you configure it once and it runs your requests end-to-end</text>

</svg>
