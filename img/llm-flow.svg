<svg xmlns="http://www.w3.org/2000/svg" width="680" height="740" viewBox="0 0 680 740" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="680" height="740" rx="16" fill="#0f1117"/>

  <!-- Title -->
  <text x="340" y="42" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700" letter-spacing="0.5">How OpenClaw Talks to an LLM</text>
  <text x="340" y="62" text-anchor="middle" fill="#64748b" font-size="12">Message flow from you to the AI and back</text>

  <!-- ── Step 1: You send a message ── -->
  <rect x="190" y="86" width="300" height="64" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="340" y="112" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">YOU</text>
  <text x="340" y="132" text-anchor="middle" fill="#cbd5e1" font-size="12">Send a message</text>
  <!-- side note -->
  <text x="506" y="121" fill="#475569" font-size="11" font-style="italic">via phone, desktop,</text>
  <text x="506" y="136" fill="#475569" font-size="11" font-style="italic">or any channel</text>
  <line x1="490" y1="118" x2="492" y2="118" stroke="#334155" stroke-width="1"/>

  <!-- Arrow 1 -->
  <line x1="340" y1="150" x2="340" y2="174" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="334,172 340,182 346,172" fill="#3b82f6"/>

  <!-- ── Step 2: OpenClaw Gateway ── -->
  <rect x="170" y="184" width="340" height="64" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <circle cx="212" cy="216" r="16" fill="#6366f1" opacity="0.2"/>
  <text x="212" y="221" text-anchor="middle" fill="#818cf8" font-size="16">⚙</text>
  <text x="348" y="209" text-anchor="middle" fill="#a5b4fc" font-size="13" font-weight="700">OpenClaw Gateway</text>
  <text x="348" y="230" text-anchor="middle" fill="#94a3b8" font-size="11">Control centre running on your server / PC</text>
  <!-- side label -->
  <rect x="524" y="195" width="130" height="42" rx="6" fill="#1e1b3a" stroke="#4338ca" stroke-width="1"/>
  <text x="589" y="212" text-anchor="middle" fill="#818cf8" font-size="10" font-weight="600">Receives message</text>
  <text x="589" y="226" text-anchor="middle" fill="#64748b" font-size="10">decides what to do</text>
  <line x1="510" y1="216" x2="524" y2="216" stroke="#4338ca" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Arrow 2 -->
  <line x1="340" y1="248" x2="340" y2="272" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="334,270 340,280 346,270" fill="#6366f1"/>

  <!-- ── Step 3: Provider Selection ── -->
  <rect x="170" y="282" width="340" height="64" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <circle cx="212" cy="314" r="16" fill="#8b5cf6" opacity="0.2"/>
  <text x="212" y="319" text-anchor="middle" fill="#c4b5fd" font-size="16">🔀</text>
  <text x="348" y="307" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">Provider Selection</text>
  <text x="348" y="328" text-anchor="middle" fill="#94a3b8" font-size="11">Picks the configured LLM (Anthropic, OpenAI, Ollama…)</text>
  <!-- side label -->
  <rect x="524" y="293" width="130" height="42" rx="6" fill="#1e1a2e" stroke="#7c3aed" stroke-width="1"/>
  <text x="589" y="310" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">Priority order:</text>
  <text x="589" y="324" text-anchor="middle" fill="#64748b" font-size="10">env key → profile → OAuth</text>
  <line x1="510" y1="314" x2="524" y2="314" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Arrow 3 -->
  <line x1="340" y1="346" x2="340" y2="370" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="334,368 340,378 346,368" fill="#8b5cf6"/>

  <!-- ── Step 4: Authentication ── -->
  <rect x="170" y="380" width="340" height="64" rx="12" fill="#1e293b" stroke="#ec4899" stroke-width="2"/>
  <circle cx="212" cy="412" r="16" fill="#ec4899" opacity="0.2"/>
  <text x="212" y="418" text-anchor="middle" fill="#f9a8d4" font-size="16">🔑</text>
  <text x="348" y="405" text-anchor="middle" fill="#f9a8d4" font-size="13" font-weight="700">Authentication</text>
  <text x="348" y="426" text-anchor="middle" fill="#94a3b8" font-size="11">Attaches API key / token to prove identity</text>
  <!-- side label -->
  <rect x="524" y="391" width="130" height="42" rx="6" fill="#2d1a24" stroke="#be185d" stroke-width="1"/>
  <text x="589" y="408" text-anchor="middle" fill="#f9a8d4" font-size="10" font-weight="600">API key, OAuth token</text>
  <text x="589" y="422" text-anchor="middle" fill="#64748b" font-size="10">or AWS credentials</text>
  <line x1="510" y1="412" x2="524" y2="412" stroke="#be185d" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Arrow 4 -->
  <line x1="340" y1="444" x2="340" y2="468" stroke="#ec4899" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="334,466 340,476 346,466" fill="#ec4899"/>

  <!-- ── Step 5: Send to LLM API ── -->
  <rect x="170" y="478" width="340" height="64" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="212" cy="510" r="16" fill="#f59e0b" opacity="0.2"/>
  <text x="212" y="516" text-anchor="middle" fill="#fcd34d" font-size="16">🌐</text>
  <text x="348" y="503" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">Send to LLM API</text>
  <text x="348" y="524" text-anchor="middle" fill="#94a3b8" font-size="11">Calls the AI service over internet (or locally)</text>
  <!-- side label -->
  <rect x="524" y="489" width="130" height="42" rx="6" fill="#271f0a" stroke="#b45309" stroke-width="1"/>
  <text x="589" y="506" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">Anthropic / OpenAI /</text>
  <text x="589" y="520" text-anchor="middle" fill="#64748b" font-size="10">Ollama / Bedrock…</text>
  <line x1="510" y1="510" x2="524" y2="510" stroke="#b45309" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Arrow 5 (AI processes, returns) -->
  <line x1="340" y1="542" x2="340" y2="566" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="334,564 340,574 346,564" fill="#f59e0b"/>

  <!-- ── Step 6: Receive AI Reply ── -->
  <rect x="190" y="576" width="300" height="52" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="340" y="597" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="700">Receive AI Reply</text>
  <text x="340" y="616" text-anchor="middle" fill="#94a3b8" font-size="11">LLM sends the response back</text>

  <!-- Arrow 6 -->
  <line x1="340" y1="628" x2="340" y2="652" stroke="#10b981" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="334,650 340,660 346,650" fill="#10b981"/>

  <!-- ── Step 7: Deliver to you ── -->
  <rect x="170" y="662" width="340" height="56" rx="12" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <text x="340" y="685" text-anchor="middle" fill="#bbf7d0" font-size="13" font-weight="700">Delivered Back to You</text>
  <text x="340" y="705" text-anchor="middle" fill="#86efac" font-size="11">Telegram · WhatsApp · Slack · Discord · iMessage…</text>

  <!-- Step number badges -->
  <circle cx="175" cy="118" r="12" fill="#3b82f6"/>
  <text x="175" y="123" text-anchor="middle" fill="white" font-size="11" font-weight="700">1</text>

  <circle cx="175" cy="216" r="12" fill="#6366f1"/>
  <text x="175" y="221" text-anchor="middle" fill="white" font-size="11" font-weight="700">2</text>

  <circle cx="175" cy="314" r="12" fill="#8b5cf6"/>
  <text x="175" y="319" text-anchor="middle" fill="white" font-size="11" font-weight="700">3</text>

  <circle cx="175" cy="412" r="12" fill="#ec4899"/>
  <text x="175" y="417" text-anchor="middle" fill="white" font-size="11" font-weight="700">4</text>

  <circle cx="175" cy="510" r="12" fill="#f59e0b"/>
  <text x="175" y="515" text-anchor="middle" fill="white" font-size="11" font-weight="700">5</text>

  <circle cx="195" cy="602" r="12" fill="#10b981"/>
  <text x="195" y="607" text-anchor="middle" fill="white" font-size="11" font-weight="700">6</text>

  <circle cx="175" cy="690" r="12" fill="#22c55e"/>
  <text x="175" y="695" text-anchor="middle" fill="white" font-size="11" font-weight="700">7</text>

  <!-- Footer -->
  <text x="340" y="730" text-anchor="middle" fill="#334155" font-size="10">OpenClaw — LLM Message Flow</text>
</svg>
