  <text x="656" y="197" text-anchor="middle" fill="#67e8f9" font-size="8.5">health/logs</text>

  <rect x="700" y="180" width="68" height="26" rx="5" fill="#083344" stroke="#0891b2" stroke-width="1"/>
  <text x="734" y="197" text-anchor="middle" fill="#67e8f9" font-size="8.5">sessions</text>

  <rect x="778" y="180" width="68" height="26" rx="5" fill="#083344" stroke="#0891b2" stroke-width="1"/>
  <text x="812" y="197" text-anchor="middle" fill="#67e8f9" font-size="8.5">models/skills</text>

  <rect x="856" y="180" width="62" height="26" rx="5" fill="#083344" stroke="#0891b2" stroke-width="1"/>
  <text x="887" y="197" text-anchor="middle" fill="#67e8f9" font-size="8.5">cron/hooks</text>

  <rect x="928" y="180" width="56" height="26" rx="5" fill="#083344" stroke="#0891b2" stroke-width="1"/>
  <text x="956" y="197" text-anchor="middle" fill="#67e8f9" font-size="8.5">+14 more</text>

  <text x="466" y="236" fill="#64748b" font-size="9">Role guard (operator / node) → Scope guard (operator.read/write/admin) → Handler fn → Response</text>

  <!-- ══════════ CHANNEL MANAGER ══════════ -->
  <rect x="20" y="262" width="300" height="110" rx="10" fill="#0a1f14" stroke="#22c55e" stroke-width="1.5"/>
  <text x="170" y="278" text-anchor="middle" fill="#64748b" font-size="9" font-weight="600">CHANNEL MANAGER — server-channels.ts</text>

  <rect x="36" y="285" width="268" height="24" rx="6" fill="#14291e" stroke="#22c55e" stroke-width="1"/>
  <text x="170" y="301" text-anchor="middle" fill="#86efac" font-size="9">aborts: Map&lt;channelKey, AbortController&gt;</text>

  <rect x="36" y="315" width="268" height="24" rx="6" fill="#14291e" stroke="#22c55e" stroke-width="1"/>
  <text x="170" y="331" text-anchor="middle" fill="#86efac" font-size="9">tasks: Map&lt;channelKey, Promise&lt;void&gt;&gt;</text>

  <text x="36" y="360" fill="#475569" font-size="9">Backoff: 5s → 5min · factor 2 · jitter 10% · max 10 retries</text>

  <!-- ══════════ HEALTH MONITOR ══════════ -->
  <rect x="334" y="262" width="240" height="110" rx="10" fill="#1a0a0a" stroke="#ef4444" stroke-width="1.5"/>
