<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="620" viewBox="0 0 1020 620" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="1020" height="620" rx="16" fill="#0f1117"/>

  <!-- Title -->
  <text x="510" y="34" text-anchor="middle" fill="#e2e8f0" font-size="17" font-weight="700">Gateway Internal Architecture — server.impl.ts</text>
  <text x="510" y="52" text-anchor="middle" fill="#475569" font-size="11">Single Node.js process · shared port 18789 · WS + HTTP via HTTP Upgrade</text>

  <!-- ══════════ TRANSPORT LAYER (top) ══════════ -->
  <rect x="20" y="68" width="980" height="72" rx="10" fill="#0d1526" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="510" y="84" text-anchor="middle" fill="#64748b" font-size="9" font-weight="600">TRANSPORT LAYER — node:http / node:https  +  ws@8  (WebSocketServer)</text>

  <!-- HTTP block -->
  <rect x="36" y="90" width="200" height="38" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="136" y="108" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">HTTP Server (node:http)</text>
  <text x="136" y="122" text-anchor="middle" fill="#475569" font-size="9">Control UI · Hooks · OpenAI endpoint</text>

  <!-- Upgrade block -->
  <rect x="250" y="90" width="140" height="38" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="320" y="108" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">HTTP Upgrade</text>
  <text x="320" y="122" text-anchor="middle" fill="#475569" font-size="9">WS handshake + auth</text>

  <!-- WS Server block -->
  <rect x="404" y="90" width="180" height="38" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="494" y="108" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">WebSocketServer (ws@8)</text>
  <text x="494" y="122" text-anchor="middle" fill="#475569" font-size="9">max 25 MB · 50 MB buffer</text>

  <!-- TLS block -->
  <rect x="598" y="90" width="130" height="38" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="663" y="108" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">TLS (optional)</text>
  <text x="663" y="122" text-anchor="middle" fill="#475569" font-size="9">auto-gen self-signed cert</text>

  <!-- Bind block -->
  <rect x="742" y="90" width="240" height="38" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="862" y="108" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">Bind Resolution (net.ts)</text>
  <text x="862" y="122" text-anchor="middle" fill="#475569" font-size="9">loopback · lan · tailnet · auto · custom</text>

  <!-- ══════════ AUTH LAYER ══════════ -->
  <rect x="20" y="158" width="420" height="86" rx="10" fill="#1a0d26" stroke="#a855f7" stroke-width="1.5"/>
  <text x="230" y="172" text-anchor="middle" fill="#64748b" font-size="9" font-weight="600">AUTH LAYER — auth.ts + auth-rate-limit.ts</text>

  <rect x="36" y="180" width="120" height="30" rx="6" fill="#2d1a3d" stroke="#a855f7" stroke-width="1"/>
  <text x="96" y="198" text-anchor="middle" fill="#d8b4fe" font-size="9">Mode Resolver</text>

  <rect x="166" y="180" width="120" height="30" rx="6" fill="#2d1a3d" stroke="#a855f7" stroke-width="1"/>
  <text x="226" y="198" text-anchor="middle" fill="#d8b4fe" font-size="9">Token / Password / Proxy</text>

