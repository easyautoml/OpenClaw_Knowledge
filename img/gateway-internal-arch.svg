  <rect x="466" y="180" width="68" height="26" rx="5" fill="#083344" stroke="#0891b2" stroke-width="1"/>
  <text x="500" y="197" text-anchor="middle" fill="#67e8f9" font-size="8.5">chat/agent</text>

