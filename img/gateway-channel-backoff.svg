<svg xmlns="http://www.w3.org/2000/svg" width="920" height="480" viewBox="0 0 920 480" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="920" height="480" rx="16" fill="#0f1117"/>

  <!-- Title -->
  <text x="460" y="34" text-anchor="middle" fill="#e2e8f0" font-size="17" font-weight="700">Channel Manager — Backoff Restart Logic</text>
  <text x="460" y="52" text-anchor="middle" fill="#475569" font-size="11">server-channels.ts + channel-health-monitor.ts · How channels survive disconnections</text>

  <!-- ═══ LEFT: Channel Manager internals ═══ -->
  <rect x="20" y="68" width="340" height="370" rx="12" fill="#0a1f14" stroke="#22c55e" stroke-width="2"/>
  <rect x="20" y="68" width="340" height="36" rx="12" fill="#14532d"/>
  <rect x="20" y="90" width="340" height="14" fill="#14532d"/>
  <text x="190" y="90" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Channel Manager — Runtime Store</text>
  <text x="190" y="104" text-anchor="middle" fill="#bbf7d0" font-size="9">createChannelManager()  ·  server-channels.ts</text>

  <!-- Store entries -->
  <text x="38" y="130" fill="#64748b" font-size="10" font-weight="600">Per-channel state (3 maps):</text>

  <rect x="38" y="138" width="304" height="44" rx="8" fill="#14291e" stroke="#22c55e" stroke-width="1"/>
  <text x="38" y="152" dx="10" fill="#86efac" font-size="9" font-weight="600">aborts:  Map&lt;channelKey, AbortController&gt;</text>
  <text x="38" y="168" dx="10" fill="#475569" font-size="8">One AbortController per channel. Calling .abort() cleanly stops the channel loop.</text>

  <rect x="38" y="188" width="304" height="44" rx="8" fill="#14291e" stroke="#22c55e" stroke-width="1"/>
  <text x="38" y="202" dx="10" fill="#86efac" font-size="9" font-weight="600">tasks:  Map&lt;channelKey, Promise&lt;void&gt;&gt;</text>
  <text x="38" y="218" dx="10" fill="#475569" font-size="8">The running async task for each channel. Awaited during shutdown.</text>

  <rect x="38" y="238" width="304" height="44" rx="8" fill="#14291e" stroke="#22c55e" stroke-width="1"/>
  <text x="38" y="252" dx="10" fill="#86efac" font-size="9" font-weight="600">runtimes:  Map&lt;channelKey, ChannelAccountSnapshot&gt;</text>
  <text x="38" y="268" dx="10" fill="#475569" font-size="8">Last-known status (connected/connecting/error) for each account.</text>

  <!-- Backoff policy -->
  <text x="38" y="302" fill="#64748b" font-size="10" font-weight="600">Restart Backoff Policy:</text>
  <rect x="38" y="310" width="304" height="76" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
  <text x="190" y="330" text-anchor="middle" fill="#4ade80" font-size="9" font-family="'Courier New', monospace">CHANNEL_RESTART_POLICY = {</text>
  <text x="190" y="347" text-anchor="middle" fill="#4ade80" font-size="9" font-family="'Courier New', monospace">  initialMs: 5_000,   // 5 s first wait</text>
  <text x="190" y="362" text-anchor="middle" fill="#4ade80" font-size="9" font-family="'Courier New', monospace">  maxMs:  300_000,    // cap at 5 min</text>
  <text x="190" y="377" text-anchor="middle" fill="#4ade80" font-size="9" font-family="'Courier New', monospace">  factor: 2, jitter: 0.1</text>
  <text x="190" y="392" text-anchor="middle" fill="#4ade80" font-size="9" font-family="'Courier New', monospace">}  // MAX_RESTART_ATTEMPTS = 10</text>

  <!-- ═══ CENTER: Backoff timeline ═══ -->
  <rect x="376" y="68" width="340" height="370" rx="12" fill="#1a1200" stroke="#f59e0b" stroke-width="2"/>
  <rect x="376" y="68" width="340" height="36" rx="12" fill="#b45309"/>
  <rect x="376" y="90" width="340" height="14" fill="#b45309"/>
  <text x="546" y="90" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Retry Wait Timeline</text>
  <text x="546" y="104" text-anchor="middle" fill="#fef3c7" font-size="9">Each failure doubles the wait (with ±10% jitter)</text>

  <!-- Timeline bars -->
  <text x="394" y="130" fill="#fbbf24" font-size="10" font-weight="600">Attempt</text>
  <text x="480" y="130" fill="#fbbf24" font-size="10" font-weight="600">Wait before retry</text>
  <text x="660" y="130" fill="#fbbf24" font-size="10" font-weight="600">Bar</text>

  <!-- rows -->
  <text x="410" y="154" text-anchor="middle" fill="#fcd34d" font-size="10">1</text>
  <text x="530" y="154" text-anchor="middle" fill="#94a3b8" font-size="10">~5 s</text>
  <rect x="630" y="142" width="20" height="14" rx="3" fill="#f59e0b"/>

  <text x="410" y="176" text-anchor="middle" fill="#fcd34d" font-size="10">2</text>
  <text x="530" y="176" text-anchor="middle" fill="#94a3b8" font-size="10">~10 s</text>
  <rect x="630" y="164" width="40" height="14" rx="3" fill="#f59e0b"/>

  <text x="410" y="198" text-anchor="middle" fill="#fcd34d" font-size="10">3</text>
  <text x="530" y="198" text-anchor="middle" fill="#94a3b8" font-size="10">~20 s</text>
  <rect x="630" y="186" width="66" height="14" rx="3" fill="#f59e0b"/>

  <text x="410" y="220" text-anchor="middle" fill="#fcd34d" font-size="10">4</text>
  <text x="530" y="220" text-anchor="middle" fill="#94a3b8" font-size="10">~40 s</text>
  <rect x="630" y="208" width="80" height="14" rx="3" fill="#f59e0b"/>

  <text x="410" y="242" text-anchor="middle" fill="#fcd34d" font-size="10">5</text>
  <text x="530" y="242" text-anchor="middle" fill="#94a3b8" font-size="10">~80 s</text>
  <rect x="630" y="230" width="80" height="14" rx="3" fill="#f59e0b"/>

  <text x="410" y="264" text-anchor="middle" fill="#fcd34d" font-size="10">6</text>
  <text x="530" y="264" text-anchor="middle" fill="#94a3b8" font-size="10">~160 s</text>
  <rect x="630" y="252" width="80" height="14" rx="3" fill="#f59e0b"/>

  <text x="410" y="286" text-anchor="middle" fill="#fcd34d" font-size="10">7+</text>
  <text x="530" y="286" text-anchor="middle" fill="#94a3b8" font-size="10">~300 s (cap)</text>
  <rect x="630" y="274" width="80" height="14" rx="3" fill="#78350f"/>

  <text x="546" y="316" text-anchor="middle" fill="#475569" font-size="8.5">Bars capped visually at maxMs. jitter adds ±10% randomness.</text>
  <text x="546" y="332" text-anchor="middle" fill="#475569" font-size="8.5">After 10 failures the task stops. Manual restart needed.</text>

  <!-- abortSignal note -->
  <rect x="394" y="346" width="304" height="38" rx="6" fill="#271f0a" stroke="#d97706" stroke-width="1"/>
  <text x="546" y="362" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">AbortController integration</text>
  <text x="546" y="378" text-anchor="middle" fill="#64748b" font-size="8.5">sleepWithAbort() respects abort signal — clean shutdown cancels the retry sleep immediately</text>

  <!-- ═══ RIGHT: Health Monitor ═══ -->
  <rect x="732" y="68" width="168" height="370" rx="12" fill="#1a0a0a" stroke="#ef4444" stroke-width="2"/>
  <rect x="732" y="68" width="168" height="36" rx="12" fill="#991b1b"/>
  <rect x="732" y="90" width="168" height="14" fill="#991b1b"/>
  <text x="816" y="90" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">Health Monitor</text>
  <text x="816" y="104" text-anchor="middle" fill="#fecaca" font-size="8">channel-health-monitor.ts</text>

  <text x="750" y="128" fill="#64748b" font-size="9" font-weight="600">Timing policy:</text>

  <rect x="748" y="136" width="136" height="22" rx="5" fill="#2a0a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="816" y="151" text-anchor="middle" fill="#fca5a5" font-size="8.5">Check: every 5 min</text>

  <rect x="748" y="162" width="136" height="22" rx="5" fill="#2a0a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="816" y="177" text-anchor="middle" fill="#fca5a5" font-size="8.5">Startup grace: 60 s</text>

  <rect x="748" y="188" width="136" height="22" rx="5" fill="#2a0a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="816" y="203" text-anchor="middle" fill="#fca5a5" font-size="8.5">Stale threshold: 30 min</text>

  <rect x="748" y="214" width="136" height="22" rx="5" fill="#2a0a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="816" y="229" text-anchor="middle" fill="#fca5a5" font-size="8.5">Cooldown: 2 cycles</text>

  <rect x="748" y="240" width="136" height="22" rx="5" fill="#2a0a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="816" y="255" text-anchor="middle" fill="#fca5a5" font-size="8.5">Max restarts/hour: 10</text>

  <text x="750" y="284" fill="#64748b" font-size="9" font-weight="600">Restart record:</text>
  <rect x="748" y="292" width="136" height="52" rx="5" fill="#2a0a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="816" y="308" text-anchor="middle" fill="#fca5a5" font-size="8">lastRestartAt: number</text>
  <text x="816" y="322" text-anchor="middle" fill="#fca5a5" font-size="8">restartsThisHour:</text>
  <text x="816" y="336" text-anchor="middle" fill="#475569" font-size="7.5">[ {at: timestamp}, ... ]</text>

  <rect x="748" y="356" width="136" height="60" rx="5" fill="#1e0a0a" stroke="#b91c1c" stroke-width="1"/>
  <text x="816" y="372" text-anchor="middle" fill="#f87171" font-size="8.5">Stale = connected but</text>
  <text x="816" y="386" text-anchor="middle" fill="#f87171" font-size="8.5">no event for 30 min.</text>
  <text x="816" y="400" text-anchor="middle" fill="#64748b" font-size="7.5">Catches "zombie" sockets</text>
  <text x="816" y="412" text-anchor="middle" fill="#64748b" font-size="7.5">that look alive but aren't.</text>

  <!-- ═══ BOTTOM BAR ═══ -->
  <rect x="20" y="454" width="880" height="18" rx="6" fill="#111827"/>
  <text x="460" y="467" text-anchor="middle" fill="#334155" font-size="9">OpenClaw — Channel Manager Backoff + Health Monitor · server-channels.ts · channel-health-monitor.ts</text>

</svg>
