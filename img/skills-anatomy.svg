<svg xmlns="http://www.w3.org/2000/svg" width="820" height="320" viewBox="0 0 820 320" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="820" height="320" rx="16" fill="#0f1117"/>

  <!-- Title -->
  <text x="410" y="26" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">Anatomy of a Skill</text>
  <text x="410" y="44" text-anchor="middle" fill="#475569" font-size="11">A skill is a folder with SKILL.md — it tells the LLM what to do and which tools to use</text>

  <!-- ══ Left: Folder structure ══ -->
  <rect x="20" y="56" width="240" height="224" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <rect x="20" y="44" width="240" height="22" rx="5" fill="#1e293b"/>
  <text x="140" y="59" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="700">Workspace folder layout</text>

  <!-- Folder tree -->
  <text x="36" y="84" fill="#64748b" font-size="11">📁 workspace/</text>
  <text x="50" y="102" fill="#64748b" font-size="11">📄 AGENTS.md</text>
  <text x="50" y="120" fill="#64748b" font-size="11">📄 SOUL.md</text>
  <text x="50" y="138" fill="#475569" font-size="11">📁 skills/</text>
  <rect x="64" y="146" width="170" height="20" rx="4" fill="#1a0d2e" stroke="#7c3aed" stroke-width="1"/>
  <text x="68" y="160" fill="#c4b5fd" font-size="11">📁 send-email/</text>
  <text x="82" y="178" fill="#8b5cf6" font-size="11">📄 SKILL.md  ← main file</text>
  <text x="82" y="196" fill="#475569" font-size="11">📄 send.py   (optional)</text>
  <rect x="64" y="204" width="170" height="20" rx="4" fill="#1a0d2e" stroke="#7c3aed" stroke-width="1"/>
  <text x="68" y="218" fill="#c4b5fd" font-size="11">📁 code-review/</text>
  <text x="82" y="236" fill="#8b5cf6" font-size="11">📄 SKILL.md</text>
  <text x="50" y="260" fill="#475569" font-size="11">📁 memory/</text>

  <!-- Arrow right -->
  <line x1="262" y1="168" x2="297" y2="168" stroke="#7c3aed" stroke-width="2"/>
  <polygon points="295,162 305,168 295,174" fill="#7c3aed"/>

  <!-- ══ Middle: SKILL.md anatomy ══ -->
  <rect x="305" y="56" width="250" height="224" rx="10" fill="#1a0d2e" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="305" y="44" width="250" height="22" rx="5" fill="#5b21b6"/>
  <text x="430" y="59" text-anchor="middle" fill="#ede9fe" font-size="10" font-weight="700">SKILL.md — Structure</text>

  <!-- Frontmatter block -->
  <rect x="315" y="66" width="230" height="68" rx="5" fill="#0f0a1e" stroke="#6d28d9" stroke-width="1"/>
  <text x="322" y="81" fill="#a78bfa" font-size="9" font-weight="600">--- (frontmatter)</text>
  <text x="322" y="96" fill="#64748b" font-size="9">name: send-email</text>
  <text x="322" y="110" fill="#64748b" font-size="9">description: Sends email via python</text>
  <text x="322" y="124" fill="#64748b" font-size="9">tools: [exec, read]</text>
  <text x="322" y="128" fill="#64748b" font-size="9">---</text>

  <!-- Body content -->
  <text x="322" y="150" fill="#94a3b8" font-size="9" font-weight="600"># When to use this skill</text>
  <text x="322" y="165" fill="#475569" font-size="9">When user asks to send an email,</text>
  <text x="322" y="178" fill="#475569" font-size="9">use exec to run send.py with</text>
  <text x="322" y="191" fill="#475569" font-size="9">the provided to/subject/body.</text>

  <line x1="315" y1="202" x2="535" y2="202" stroke="#2e1b4e" stroke-width="1"/>

  <text x="322" y="218" fill="#94a3b8" font-size="9" font-weight="600"># Format</text>
  <text x="322" y="232" fill="#475569" font-size="9">Reply with a confirmation like:</text>
  <text x="322" y="246" fill="#475569" font-size="9">"Email sent to {to}."</text>

  <text x="322" y="265" fill="#7c3aed" font-size="9" font-style="italic">Loaded into LLM context every call</text>

  <!-- Arrow right -->
  <line x1="557" y1="168" x2="592" y2="168" stroke="#10b981" stroke-width="2"/>
  <polygon points="590,162 600,168 590,174" fill="#10b981"/>

  <!-- ══ Right: Effect ══ -->
  <rect x="600" y="56" width="200" height="224" rx="10" fill="#071a12" stroke="#10b981" stroke-width="2"/>
  <rect x="600" y="44" width="200" height="22" rx="5" fill="#065f46"/>
  <text x="700" y="59" text-anchor="middle" fill="#d1fae5" font-size="10" font-weight="700">What Happens at Runtime</text>

  <text x="700" y="92" text-anchor="middle" fill="#6ee7b7" font-size="22">⚙</text>

  <text x="610" y="120" fill="#64748b" font-size="9" font-weight="600">1. User: "Send email to Alex"</text>
  <line x1="610" y1="126" x2="790" y2="126" stroke="#134e3c" stroke-width="1"/>
  <text x="610" y="142" fill="#64748b" font-size="9">2. Agent loads SKILL.md</text>
  <text x="610" y="156" fill="#64748b" font-size="9">   into the LLM prompt</text>
  <line x1="610" y1="162" x2="790" y2="162" stroke="#134e3c" stroke-width="1"/>
  <text x="610" y="178" fill="#64748b" font-size="9">3. LLM sees the guidance:</text>
  <text x="610" y="192" fill="#64748b" font-size="9">   "use exec → send.py"</text>
  <line x1="610" y1="198" x2="790" y2="198" stroke="#134e3c" stroke-width="1"/>
  <text x="610" y="214" fill="#64748b" font-size="9">4. LLM calls exec tool</text>
  <text x="610" y="228" fill="#64748b" font-size="9">   with send.py command</text>
  <line x1="610" y1="234" x2="790" y2="234" stroke="#134e3c" stroke-width="1"/>
  <text x="610" y="250" fill="#10b981" font-size="9" font-weight="600">5. Email sent ✓</text>
  <text x="610" y="265" fill="#10b981" font-size="9">   Bot replies: "Sent!"</text>

  <!-- Footer -->
  <rect x="20" y="292" width="780" height="14" rx="4" fill="#1e293b"/>
  <text x="410" y="303" text-anchor="middle" fill="#475569" font-size="10">The LLM never "knows" how to send email on its own — the Skill teaches it, and the exec Tool actually runs the script</text>

</svg>
